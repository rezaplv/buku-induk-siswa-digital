      <div class="card">
        <div class="card-header"><h3>Tambah Mata Pelajaran</h3></div>
        
        <!-- Manual (satu per satu) -->
        <form onsubmit="DataAkademik.addMapel(event)" style="display:flex;gap:12px;align-items:flex-end;margin-bottom:16px;">
          <div class="form-group" style="flex:1;margin-bottom:0;">
            <label>Manual (satu per satu)</label>
            <input type="text" id="mapel-input" required placeholder="Contoh: Prakarya dan Kewirausahaan">
          </div>
          <button type="submit" class="btn btn-primary" style="height:42px;">+ Tambah</button>
        </form>
        
        <hr style="margin:16px 0;border:none;border-top:1px solid var(--border-color);">
        
        <!-- Batch (banyak sekaligus) -->
        <div class="form-group">
          <label>Batch (satu mapel per baris)</label>
          <textarea id="mapel-batch-input" rows="6" placeholder="Contoh:\nPrakarya dan Kewirausahaan\nBahasa Arab\nTahfidz\nMuatan Lokal"></textarea>
        </div>
        <div style="display:flex;gap:12px;align-items:center;">
          <button type="button" class="btn btn-primary" onclick="DataAkademik.addMapelBatch()">+ Tambah Semua</button>
          <span id="mapel-batch-count" style="font-size:12px;color:var(--text-muted);"></span>
        </div>
      </div>
      <div class="card" style="margin-top:16px;">
        <p style="font-size:12px;color:var(--text-muted);">
          <strong>Catatan:</strong> Mata pelajaran yang ditambahkan di sini akan muncul di halaman Input Nilai dan Cetak Buku Induk. 
          Menghapus mata pelajaran tidak akan menghapus data nilai yang sudah tersimpan.
        </p>
      </div>
    `;
  },

  addMapel(event) {
    event.preventDefault();
    const input = document.getElementById('mapel-input');
    const nama = input.value.trim();
    if (!nama) { alert('Nama mata pelajaran wajib diisi!'); return; }
    if (this.mapelList.includes(nama)) { alert('Mata pelajaran "' + nama + '" sudah ada!'); return; }
    this.mapelList.push(nama);
    this.saveMapel();
    this.render();
  },

  addMapelBatch() {
    const textarea = document.getElementById('mapel-batch-input');
    const text = textarea.value.trim();
    if (!text) { alert('Masukkan daftar mata pelajaran (satu per baris).'); return; }

    const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    if (lines.length === 0) { alert('Tidak ada data yang valid.'); return; }

    let added = 0;
    let skipped = 0;
    const skippedNames = [];

    for (const nama of lines) {
      if (this.mapelList.includes(nama)) {
        skipped++;
        skippedNames.push(nama);
      } else {
        this.mapelList.push(nama);
        added++;
      }
    }

    this.saveMapel();
    this.render();

    let msg = 'Berhasil menambahkan ' + added + ' mata pelajaran.';
    if (skipped > 0) {
      msg += '\n\n' + skipped + ' mapel dilewati (sudah ada): ' + skippedNames.join(', ');
    }
    alert(msg);
  },

  deleteMapel(index) {
    const nama = this.mapelList[index];
    if (!confirm('Hapus mata pelajaran "' + nama + '"?')) return;
    this.mapelList.splice(index, 1);
    this.saveMapel();
    this.render();
  }
};
  </script>


  <!-- input-nilai.js (REDESIGNED - paste kolom per mapel per semester) -->
  <script>
const InputNilai = {
  allAkademik: [],
  students: [],
  selectedTP: '',
  selectedKelas: '',
  selectedSemester: '1',
  selectedMapel: '',
  studentList: [],
  nilaiValues: [],
  deskValues: [],
  mode: 'nilai', // 'nilai' or 'deskripsi'
  showingRekap: false,
  showingRekapDesk: false,
  rekapDeskStudentIndex: 0,

  async init() { await this.loadData(); this.render(); },
  async loadData() {
    this.students = await DB.getAllSiswa();
    this.allAkademik = await DB.getAllAkademik();
  },
  getTPList() { const s = new Set(); this.allAkademik.forEach(a => { if (a.tahunPelajaran) s.add(a.tahunPelajaran); }); return [...s].sort(); },
  getKelasList() {
    if (!this.selectedTP) return [];
    const s = new Set(); this.allAkademik.filter(a => a.tahunPelajaran === this.selectedTP).forEach(a => { if (a.kelas) s.add(a.kelas); });
    return [...s].sort();
  },
  getStudentsInClass() {
    if (!this.selectedTP || !this.selectedKelas) return [];
    const akademikInClass = this.allAkademik.filter(a => a.tahunPelajaran === this.selectedTP && a.kelas === this.selectedKelas);
    const uniqueByNIS = {};
    akademikInClass.forEach(a => { uniqueByNIS[a.nis] = a; });
    return Object.values(uniqueByNIS).map(a => {
      const siswa = this.students.find(s => s.nis === a.nis);
      return { ...a, nama: siswa ? siswa.nama : a.nis, nisn: siswa ? siswa.nisn : '' };
    }).sort((a, b) => a.nama.localeCompare(b.nama));
  },
  onTPChange(val) { this.selectedTP = val; this.selectedKelas = ''; this.selectedMapel = ''; this.studentList = []; this.nilaiValues = []; this.deskValues = []; this.showingRekap = false; this.showingRekapDesk = false; this.render(); },
  onKelasChange(val) { this.selectedKelas = val; this.selectedMapel = ''; this.studentList = this.getStudentsInClass(); this.nilaiValues = []; this.deskValues = []; this.showingRekap = false; this.showingRekapDesk = false; this.render(); },
  onSemesterChange(val) { this.selectedSemester = val; this.nilaiValues = []; this.deskValues = []; this.showingRekap = false; this.showingRekapDesk = false; this.render(); if (this.selectedMapel) this.loadExistingNilai(); },
  onMapelChange(val) { this.selectedMapel = val; this.nilaiValues = []; this.deskValues = []; this.showingRekap = false; this.showingRekapDesk = false; this.render(); if (val) this.loadExistingNilai(); },

  setMode(mode) {
    this.mode = mode;
    this.nilaiValues = [];
    this.deskValues = [];
    this.showingRekap = false;
    this.showingRekapDesk = false;
    this.render();
    if (this.selectedMapel) this.loadExistingNilai();
  },

  getMapelShortNames() {
    return {
      'Pendidikan Agama dan Budi Pekerti': 'PAI',
      'Pendidikan Pancasila': 'PKn',
      'Bahasa Indonesia': 'B.ID',
      'Matematika': 'MTK',
      'IPA': 'IPA',
      'IPS': 'IPS',
      'Bahasa Inggris': 'B.Ing',
      'PJOK': 'PJOK',
      'Informatika': 'Info',
      'Seni Budaya dan Prakarya': 'SBP',
      'Bahasa Jawa': 'B.Jw'
    };
  },

  async loadExistingNilai() {
    if (!this.selectedMapel || !this.selectedSemester || this.studentList.length === 0) return;
    if (this.mode === 'deskripsi') {
      const field = this.selectedSemester === '1' ? 'deskSem1' : 'deskSem2';
      const values = [];
      for (const student of this.studentList) {
        const nilaiArr = await DB.getNilaiByAkademik(student.id);
        const found = nilaiArr.find(n => n.mapel === this.selectedMapel);
        values.push(found && found[field] ? String(found[field]) : '');
      }
      this.deskValues = values;
      this.updateDeskInputs();
      this.updateDeskTextareaFromValues();
    } else {
      const field = this.selectedSemester === '1' ? 'nilaiSem1' : 'nilaiSem2';
      const values = [];
      for (const student of this.studentList) {
        const nilaiArr = await DB.getNilaiByAkademik(student.id);
        const found = nilaiArr.find(n => n.mapel === this.selectedMapel);
        values.push(found && found[field] != null ? String(found[field]) : '');
      }
      this.nilaiValues = values;
      this.updateTableInputs();
      this.updateTextareaFromValues();
    }
  },

  updateTableInputs() {
    for (let i = 0; i < this.studentList.length; i++) {
      const input = document.getElementById('nilai-input-' + i);
      if (input) input.value = this.nilaiValues[i] || '';
    }
  },

  updateTextareaFromValues() {
    const ta = document.getElementById('paste-nilai-textarea');
    if (ta) ta.value = this.nilaiValues.join('\n');
  },

  updateDeskInputs() {
    for (let i = 0; i < this.studentList.length; i++) {
      const ta = document.getElementById('desk-input-' + i);
      if (ta) ta.value = this.deskValues[i] || '';
    }
  },

  updateDeskTextareaFromValues() {
    const ta = document.getElementById('paste-desk-textarea');
    if (ta) ta.value = this.deskValues.join('\n');
  },

  render() {
    const page = document.getElementById('page-input-nilai');
    const tpList = this.getTPList();
    const kelasList = this.getKelasList();
    this.studentList = this.getStudentsInClass();
    const allSelected = this.selectedTP && this.selectedKelas && this.selectedSemester && this.selectedMapel;
    const canShowRekap = this.selectedTP && this.selectedKelas && this.selectedSemester && this.studentList.length > 0;

    page.innerHTML = `
      <div class="page-header"><h2 class="page-title">Input Nilai</h2></div>
      <div class="card" style="margin-bottom:16px;">
        <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;">
          <div class="form-group" style="margin-bottom:0;min-width:180px;">
            <label>Tahun Pelajaran</label>
            <select id="in-tp" onchange="InputNilai.onTPChange(this.value)">
              <option value="">-- Pilih TP --</option>
              ${tpList.map(tp => '<option value="' + escapeHTMLDash(tp) + '"' + (this.selectedTP === tp ? ' selected' : '') + '>' + escapeHTMLDash(tp) + '</option>').join('')}
            </select>
          </div>
          <div class="form-group" style="margin-bottom:0;min-width:180px;">
            <label>Kelas</label>
            <select id="in-kelas" onchange="InputNilai.onKelasChange(this.value)" ${!this.selectedTP ? 'disabled' : ''}>
              <option value="">-- Pilih Kelas --</option>
              ${kelasList.map(k => '<option value="' + escapeHTMLDash(k) + '"' + (this.selectedKelas === k ? ' selected' : '') + '>' + escapeHTMLDash(k) + '</option>').join('')}
            </select>
          </div>
          <div class="form-group" style="margin-bottom:0;min-width:150px;">
            <label>Semester</label>
            <select id="in-semester" onchange="InputNilai.onSemesterChange(this.value)" ${!this.selectedKelas ? 'disabled' : ''}>
              <option value="1" ${this.selectedSemester === '1' ? 'selected' : ''}>Semester 1</option>
              <option value="2" ${this.selectedSemester === '2' ? 'selected' : ''}>Semester 2</option>
            </select>
          </div>
          <div class="form-group" style="margin-bottom:0;min-width:220px;flex:1;">
            <label>Mata Pelajaran</label>
            <select id="in-mapel" onchange="InputNilai.onMapelChange(this.value)" ${!this.selectedKelas ? 'disabled' : ''}>
              <option value="">-- Pilih Mapel --</option>
              ${MATA_PELAJARAN.map(mp => '<option value="' + escapeHTMLDash(mp) + '"' + (this.selectedMapel === mp ? ' selected' : '') + '>' + escapeHTMLDash(mp) + '</option>').join('')}
            </select>
          </div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;margin-top:12px;">
          <label style="font-size:13px;font-weight:600;color:var(--text-secondary);">Mode:</label>
          <button class="btn btn-sm ${this.mode === 'nilai' ? 'btn-primary' : 'btn-outline'}" onclick="InputNilai.setMode('nilai')">Nilai Angka</button>
          <button class="btn btn-sm ${this.mode === 'deskripsi' ? 'btn-primary' : 'btn-outline'}" onclick="InputNilai.setMode('deskripsi')">Deskripsi Capaian</button>
        </div>
      </div>
      ${canShowRekap && this.mode === 'nilai' && !this.showingRekap ? '<div style="margin-bottom:16px;"><button type="button" class="btn btn-outline" onclick="InputNilai.showRekap()" id="btn-rekap-kelas"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px;"><path d="M3 3h18v18H3z"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/></svg>Lihat Rekap Kelas</button></div>' : ''}
      ${canShowRekap && this.mode === 'deskripsi' && !this.showingRekapDesk ? '<div style="margin-bottom:16px;"><button type="button" class="btn btn-outline" onclick="InputNilai.showRekapDesk()" id="btn-rekap-desk"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px;"><path d="M3 3h18v18H3z"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/></svg>Lihat Rekap Deskripsi</button></div>' : ''}
      ${this.showingRekap ? '<div id="rekap-kelas-container"></div>' : (this.showingRekapDesk ? '<div id="rekap-desk-container"></div>' : (allSelected && this.studentList.length > 0 ? (this.mode === 'deskripsi' ? this.renderDeskripsiArea() : this.renderInputArea()) : this.renderPlaceholder()))}`;

    if (!this.showingRekap && !this.showingRekapDesk && allSelected && this.studentList.length > 0) {
      if (this.mode === 'deskripsi') {
        this.updateDeskInputs();
        this.updateDeskTextareaFromValues();
      } else {
        this.updateTableInputs();
        this.updateTextareaFromValues();
      }
    }
    if (this.showingRekap) {
      this.renderRekapTable();
    }
    if (this.showingRekapDesk) {
      this.loadRekapDeskData();
    }
  },

  renderPlaceholder() {
    if (this.selectedTP && this.selectedKelas && this.studentList.length === 0) {
      return '<div class="card"><p class="muted">Tidak ada siswa di kelas ini. Tambahkan data akademik terlebih dahulu.</p></div>';
    }
    if (!this.selectedMapel && this.selectedKelas) {
      return '<div class="card"><p class="muted">Pilih Mata Pelajaran untuk mulai input nilai.</p></div>';
    }
    return '<div class="card"><p class="muted">Pilih Tahun Pelajaran, Kelas, Semester, dan Mata Pelajaran untuk mulai input nilai.</p></div>';
  },

  renderInputArea() {
    const semLabel = this.selectedSemester === '1' ? 'Semester 1' : 'Semester 2';
    return '<div class="card" style="margin-bottom:16px;"><h3 class="section-title">Paste Nilai - ' + escapeHTMLDash(this.selectedMapel) + ' (' + semLabel + ')</h3><p class="muted" style="margin-bottom:8px;">Copy satu kolom nilai dari Excel (' + this.studentList.length + ' baris, urut alfabet), lalu paste di bawah ini. Satu nilai per baris. Nilai desimal gunakan koma (83,5) atau titik (83.5).</p><textarea id="paste-nilai-textarea" rows="6" style="width:100%;font-family:monospace;font-size:14px;padding:10px;border:1px solid var(--border-color);border-radius:8px;resize:vertical;margin-bottom:12px;" placeholder="Paste ' + this.studentList.length + ' nilai di sini (satu per baris)..."></textarea><button type="button" class="btn btn-outline" onclick="InputNilai.applyPaste()" style="margin-bottom:16px;">Terapkan dari Paste</button></div><div class="card"><h3 class="section-title">Preview Nilai - ' + escapeHTMLDash(this.selectedMapel) + ' (' + semLabel + ')</h3><p class="muted" style="margin-bottom:12px;">' + this.studentList.length + ' siswa (urut alfabet). Edit manual juga bisa langsung di kolom Nilai.</p><div class="table-container"><table class="data-table"><thead><tr><th style="width:50px;">No</th><th>Nama Siswa</th><th style="width:100px;">NIS</th><th style="width:120px;">Nilai</th></tr></thead><tbody>' + this.studentList.map((s, i) => '<tr><td>' + (i + 1) + '</td><td>' + escapeHTMLDash(s.nama) + '</td><td>' + escapeHTMLDash(s.nis) + '</td><td><input type="text" class="input-sm" id="nilai-input-' + i + '" value="" style="width:80px;text-align:center;" onchange="InputNilai.onManualInput(' + i + ', this.value)"></td></tr>').join('') + '</tbody></table></div><div class="form-actions" style="margin-top:16px;"><button type="button" class="btn btn-primary" onclick="InputNilai.saveAll()">Simpan Semua</button><button type="button" class="btn btn-outline" onclick="InputNilai.clearAll()" style="margin-left:8px;">Hapus Semua Nilai</button></div></div>';
  },

  renderDeskripsiArea() {
    const semLabel = this.selectedSemester === '1' ? 'Semester 1' : 'Semester 2';
    return '<div class="card" style="margin-bottom:16px;"><h3 class="section-title">Paste Deskripsi - ' + escapeHTMLDash(this.selectedMapel) + ' (' + semLabel + ')</h3><p class="muted" style="margin-bottom:8px;">Paste Deskripsi (satu per baris per siswa). Urut alfabet sesuai daftar siswa (' + this.studentList.length + ' baris).</p><textarea id="paste-desk-textarea" rows="6" style="width:100%;font-family:monospace;font-size:14px;padding:10px;border:1px solid var(--border-color);border-radius:8px;resize:vertical;margin-bottom:12px;" placeholder="Paste ' + this.studentList.length + ' deskripsi di sini (satu per baris)..."></textarea><button type="button" class="btn btn-outline" onclick="InputNilai.applyPasteDeskripsi()" style="margin-bottom:16px;">Terapkan dari Paste</button></div><div class="card"><h3 class="section-title">Deskripsi Capaian - ' + escapeHTMLDash(this.selectedMapel) + ' (' + semLabel + ')</h3><p class="muted" style="margin-bottom:12px;">' + this.studentList.length + ' siswa (urut alfabet). Edit langsung di kolom Deskripsi Capaian.</p><div class="table-container"><table class="data-table"><thead><tr><th style="width:50px;">No</th><th style="width:180px;">Nama Siswa</th><th>Deskripsi Capaian</th></tr></thead><tbody>' + this.studentList.map((s, i) => '<tr><td>' + (i + 1) + '</td><td>' + escapeHTMLDash(s.nama) + '</td><td><textarea id="desk-input-' + i + '" rows="3" style="width:100%;font-size:13px;padding:8px;border:1px solid var(--border-color);border-radius:6px;resize:vertical;" onchange="InputNilai.onManualDeskInput(' + i + ', this.value)"></textarea></td></tr>').join('') + '</tbody></table></div><div class="form-actions" style="margin-top:16px;"><button type="button" class="btn btn-primary" onclick="InputNilai.saveAll()">Simpan Semua</button><button type="button" class="btn btn-outline" onclick="InputNilai.clearAllDesk()" style="margin-left:8px;">Hapus Semua Deskripsi</button></div></div>';
  },

  onManualInput(index, value) {
    this.nilaiValues[index] = value.trim();
  },

  applyPaste() {
    const ta = document.getElementById('paste-nilai-textarea');
    if (!ta) return;
    const lines = ta.value.split('\n').map(l => l.trim());
    for (let i = 0; i < this.studentList.length; i++) {
      const raw = (lines[i] || '').replace(',', '.');
      this.nilaiValues[i] = raw;
      const input = document.getElementById('nilai-input-' + i);
      if (input) input.value = raw;
    }
    if (lines.filter(l => l !== '').length < this.studentList.length && lines.filter(l => l !== '').length > 0) {
      alert('Perhatian: jumlah baris paste (' + lines.filter(l => l !== '').length + ') kurang dari jumlah siswa (' + this.studentList.length + '). Baris yang kosong tidak diisi.');
    }
  },

  clearAll() {
    if (!confirm('Hapus semua nilai di tabel?')) return;
    this.nilaiValues = this.studentList.map(() => '');
    this.updateTableInputs();
    const ta = document.getElementById('paste-nilai-textarea');
    if (ta) ta.value = '';
    for (let i = 0; i < this.studentList.length; i++) {
      const input = document.getElementById('nilai-input-' + i);
      if (input) input.style.background = '';
    }
  },

  onManualDeskInput(index, value) {
    this.deskValues[index] = value;
  },

  applyPasteDeskripsi() {
    const ta = document.getElementById('paste-desk-textarea');
    if (!ta) return;
    const lines = ta.value.split('\n');
    for (let i = 0; i < this.studentList.length; i++) {
      const raw = lines[i] !== undefined ? lines[i] : '';
      this.deskValues[i] = raw;
      const input = document.getElementById('desk-input-' + i);
      if (input) input.value = raw;
    }
    if (lines.filter(l => l !== '').length < this.studentList.length && lines.filter(l => l !== '').length > 0) {
      alert('Perhatian: jumlah baris paste (' + lines.filter(l => l !== '').length + ') kurang dari jumlah siswa (' + this.studentList.length + '). Baris yang kosong tidak diisi.');
    }
  },

  clearAllDesk() {
    if (!confirm('Hapus semua deskripsi di tabel?')) return;
    this.deskValues = this.studentList.map(() => '');
    this.updateDeskInputs();
    const ta = document.getElementById('paste-desk-textarea');
    if (ta) ta.value = '';
  },

  parseNilai(raw) {
    if (!raw || raw === '') return null;
    const normalized = raw.replace(',', '.');
    const val = parseFloat(normalized);
    if (isNaN(val)) return null;
    return val;
  },

  async saveAll() {
    if (!this.selectedMapel || !this.selectedSemester || this.studentList.length === 0) return;
    if (this.mode === 'deskripsi') {
      // Collect current textarea values from DOM
      for (let i = 0; i < this.studentList.length; i++) {
        const ta = document.getElementById('desk-input-' + i);
        if (ta) this.deskValues[i] = ta.value;
      }
      const field = this.selectedSemester === '1' ? 'deskSem1' : 'deskSem2';
      let savedCount = 0;
      for (let i = 0; i < this.studentList.length; i++) {
        const student = this.studentList[i];
        const deskVal = this.deskValues[i] || '';
        const nilaiArr = await DB.getNilaiByAkademik(student.id);
        const existing = nilaiArr.find(n => n.mapel === this.selectedMapel);
        if (existing) {
          const updated = { ...existing };
          updated[field] = deskVal;
          await DB.updateNilai(updated);
        } else {
          const newRecord = { akademikId: student.id, mapel: this.selectedMapel, nilaiSem1: null, nilaiSem2: null, deskSem1: '', deskSem2: '' };
          newRecord[field] = deskVal;
          await DB.addNilai(newRecord);
        }
        savedCount++;
      }
      alert('Berhasil menyimpan deskripsi ' + this.selectedMapel + ' (Semester ' + this.selectedSemester + ') untuk ' + savedCount + ' siswa!');
      await this.loadExistingNilai();
    } else {
      // Collect current input values from DOM
      for (let i = 0; i < this.studentList.length; i++) {
        const input = document.getElementById('nilai-input-' + i);
        if (input) this.nilaiValues[i] = input.value.trim();
      }
      // Validate
      for (let i = 0; i < this.studentList.length; i++) {
        const raw = this.nilaiValues[i] || '';
        if (raw === '') continue;
        const val = this.parseNilai(raw);
        if (val === null || val < 0 || val > 100) {
          alert('Nilai baris ' + (i + 1) + ' (' + this.studentList[i].nama + ') tidak valid: "' + raw + '". Harus angka 0-100.');
          return;
        }
      }
      const field = this.selectedSemester === '1' ? 'nilaiSem1' : 'nilaiSem2';
      let savedCount = 0;
      for (let i = 0; i < this.studentList.length; i++) {
        const student = this.studentList[i];
        const raw = this.nilaiValues[i] || '';
        const parsedVal = this.parseNilai(raw);
        const nilaiArr = await DB.getNilaiByAkademik(student.id);
        const existing = nilaiArr.find(n => n.mapel === this.selectedMapel);
        if (existing) {
          const updated = { ...existing };
          updated[field] = parsedVal;
          await DB.updateNilai(updated);
        } else {
          const newRecord = { akademikId: student.id, mapel: this.selectedMapel, nilaiSem1: null, nilaiSem2: null, deskSem1: '', deskSem2: '' };
          newRecord[field] = parsedVal;
          await DB.addNilai(newRecord);
        }
        savedCount++;
      }
      alert('Berhasil menyimpan nilai ' + this.selectedMapel + ' (Semester ' + this.selectedSemester + ') untuk ' + savedCount + ' siswa!');
      await this.loadExistingNilai();
      this.markSavedIndicators();
    }
  },

  markSavedIndicators() {
    for (let i = 0; i < this.studentList.length; i++) {
      const input = document.getElementById('nilai-input-' + i);
      if (input && this.nilaiValues[i] !== '') {
        input.style.background = 'var(--emerald-light)';
      }
    }
  },

  async showRekap() {
    this.showingRekap = true;
    this.showingRekapDesk = false;
    this.render();
  },

  hideRekap() {
    this.showingRekap = false;
    this.render();
  },

  async renderRekapTable() {
    const container = document.getElementById('rekap-kelas-container');
    if (!container) return;
    const shortNames = this.getMapelShortNames();
    const semLabel = this.selectedSemester === '1' ? 'Semester 1' : 'Semester 2';
    const field = this.selectedSemester === '1' ? 'nilaiSem1' : 'nilaiSem2';
    const rekapData = [];
    for (const student of this.studentList) {
      const nilaiArr = await DB.getNilaiByAkademik(student.id);
      const nilaiMap = {};
      nilaiArr.forEach(n => { nilaiMap[n.mapel] = n; });
      rekapData.push({ student, nilaiMap });
    }
    let headerCols = '<th style="width:40px;position:sticky;left:0;background:var(--bg-primary);z-index:1;">No</th><th style="min-width:150px;position:sticky;left:40px;background:var(--bg-primary);z-index:1;">Nama Siswa</th><th style="width:80px;">NIS</th>';
    MATA_PELAJARAN.forEach(mp => {
      const short = shortNames[mp] || mp.substring(0, 4);
      headerCols += '<th style="width:50px;text-align:center;font-size:11px;">' + escapeHTMLDash(short) + '</th>';
    });
    let rows = '';
    rekapData.forEach((item, idx) => {
      let cols = '<td style="position:sticky;left:0;background:#fff;z-index:1;">' + (idx + 1) + '</td>';
      cols += '<td style="position:sticky;left:40px;background:#fff;z-index:1;white-space:nowrap;">' + escapeHTMLDash(item.student.nama) + '</td>';
      cols += '<td>' + escapeHTMLDash(item.student.nis) + '</td>';
      MATA_PELAJARAN.forEach(mp => {
        const n = item.nilaiMap[mp];
        const val = n && n[field] != null ? String(n[field]) : '-';
        cols += '<td style="text-align:center;">' + escapeHTMLDash(val) + '</td>';
      });
      rows += '<tr>' + cols + '</tr>';
    });
    container.innerHTML = '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><h3 class="section-title" style="margin-bottom:0;">Rekap Nilai Kelas ' + escapeHTMLDash(this.selectedKelas) + ' - ' + semLabel + '</h3><button type="button" class="btn btn-outline" onclick="InputNilai.hideRekap()">Tutup Rekap</button></div><p class="muted" style="margin-bottom:12px;">Rekap semua mata pelajaran untuk ' + this.studentList.length + ' siswa. Scroll horizontal jika kolom tidak muat.</p><div style="overflow-x:auto;"><table class="data-table" style="min-width:900px;font-size:13px;"><thead><tr>' + headerCols + '</tr></thead><tbody>' + rows + '</tbody></table></div></div>';
  },

  showRekapDesk() {
    this.showingRekapDesk = true;
    this.showingRekap = false;
    this.rekapDeskStudentIndex = 0;
    this.render();
  },

  hideRekapDesk() {
    this.showingRekapDesk = false;
    this.render();
  },

  onRekapDeskStudentChange(index) {
    this.rekapDeskStudentIndex = parseInt(index);
    this.loadRekapDeskData();
  },

  async loadRekapDeskData() {
    const container = document.getElementById('rekap-desk-container');
    if (!container) return;
    const semLabel = this.selectedSemester === '1' ? 'Semester 1' : 'Semester 2';
    const field = this.selectedSemester === '1' ? 'deskSem1' : 'deskSem2';
    const student = this.studentList[this.rekapDeskStudentIndex];
    if (!student) return;
    let dropdownHTML = '<select onchange="InputNilai.onRekapDeskStudentChange(this.value)" style="padding:8px 12px;border:1px solid var(--border-color);border-radius:var(--radius-sm);font-size:14px;min-width:300px;">';
    this.studentList.forEach((s, i) => {
      dropdownHTML += '<option value="' + i + '"' + (i === this.rekapDeskStudentIndex ? ' selected' : '') + '>' + escapeHTMLDash(s.nama) + ' (' + escapeHTMLDash(s.nis) + ')</option>';
    });
    dropdownHTML += '</select>';
    const nilaiArr = await DB.getNilaiByAkademik(student.id);
    const nilaiMap = {};
    nilaiArr.forEach(n => { nilaiMap[n.mapel] = n; });
    let rows = '';
    MATA_PELAJARAN.forEach((mp, idx) => {
      const n = nilaiMap[mp];
      const desc = n && n[field] ? escapeHTMLDash(n[field]) : '-';
      rows += '<tr><td style="text-align:center;">' + (idx + 1) + '</td><td>' + escapeHTMLDash(mp) + '</td><td>' + desc + '</td></tr>';
    });
    container.innerHTML = '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><h3 class="section-title" style="margin-bottom:0;">Rekap Deskripsi Capaian - Kelas ' + escapeHTMLDash(this.selectedKelas) + ' (' + semLabel + ')</h3><button type="button" class="btn btn-outline" onclick="InputNilai.hideRekapDesk()">Tutup Rekap</button></div><div style="margin-bottom:16px;"><label style="font-size:13px;font-weight:600;color:var(--text-secondary);display:block;margin-bottom:6px;">Pilih Siswa:</label>' + dropdownHTML + '</div><div class="table-container"><table class="data-table"><thead><tr><th style="width:50px;">No</th><th style="width:250px;">Mata Pelajaran</th><th>Catatan ' + semLabel + '</th></tr></thead><tbody>' + rows + '</tbody></table></div></div>';
  }
};
  </script>



  <!-- ekstrakurikuler.js -->
  <script>
const Ekstrakurikuler = {
  allAkademik: [],
  students: [],
  selectedTP: '',
  selectedKelas: '',
  selectedSemester: '1',
  studentList: [],
  kegiatanValues: [],
  keteranganValues: [],
  showingRekap: false,

  async init() { await this.loadData(); this.render(); },

  async loadData() {
    this.students = await DB.getAllSiswa();
    this.allAkademik = await DB.getAllAkademik();
  },

  getTPList() {
    const s = new Set();
    this.allAkademik.forEach(a => { if (a.tahunPelajaran) s.add(a.tahunPelajaran); });
    return [...s].sort();
  },

  getKelasList() {
    if (!this.selectedTP) return [];
    const s = new Set();
    this.allAkademik.filter(a => a.tahunPelajaran === this.selectedTP).forEach(a => { if (a.kelas) s.add(a.kelas); });
    return [...s].sort();
  },

  getStudentsInClass() {
    if (!this.selectedTP || !this.selectedKelas) return [];
    const akademikInClass = this.allAkademik.filter(a => a.tahunPelajaran === this.selectedTP && a.kelas === this.selectedKelas);
    const uniqueByNIS = {};
    akademikInClass.forEach(a => { uniqueByNIS[a.nis] = a; });
    return Object.values(uniqueByNIS).map(a => {
      const siswa = this.students.find(s => s.nis === a.nis);
      return { ...a, nama: siswa ? siswa.nama : a.nis, nisn: siswa ? siswa.nisn : '' };
    }).sort((a, b) => a.nama.localeCompare(b.nama));
  },

  onTPChange(val) {
    this.selectedTP = val;
    this.selectedKelas = '';
    this.studentList = [];
    this.kegiatanValues = [];
    this.keteranganValues = [];
    this.showingRekap = false;
    this.render();
  },

  onKelasChange(val) {
    this.selectedKelas = val;
    this.studentList = this.getStudentsInClass();
    this.kegiatanValues = this.studentList.map(() => '');
    this.keteranganValues = this.studentList.map(() => '');
    this.showingRekap = false;
    this.render();
    if (this.studentList.length > 0) this.loadExisting();
  },

  onSemesterChange(val) {
    this.selectedSemester = val;
    this.kegiatanValues = this.studentList.map(() => '');
    this.keteranganValues = this.studentList.map(() => '');
    this.showingRekap = false;
    this.render();
    if (this.studentList.length > 0) this.loadExisting();
  },

  async loadExisting() {
    if (!this.selectedTP || !this.selectedKelas || this.studentList.length === 0) return;
    const kegField = this.selectedSemester === '1' ? 'ekskulKegiatan1' : 'ekskulKegiatan2';
    const ketField = this.selectedSemester === '1' ? 'ekskulKet1' : 'ekskulKet2';

    for (let i = 0; i < this.studentList.length; i++) {
      const student = this.studentList[i];
      const nonAkademikArr = await DB.getNonAkademikByAkademik(student.id);
      const na = nonAkademikArr.length > 0 ? nonAkademikArr[0] : null;
      this.kegiatanValues[i] = na ? (na[kegField] || '') : '';
      this.keteranganValues[i] = na ? (na[ketField] || '') : '';
    }
    this.updateTableInputs();
    this.updateTextareasFromValues();
  },

  updateTableInputs() {
    for (let i = 0; i < this.studentList.length; i++) {
      const kegInput = document.getElementById('ekskul-kegiatan-' + i);
      const ketInput = document.getElementById('ekskul-ket-' + i);
      if (kegInput) kegInput.value = this.kegiatanValues[i] || '';
      if (ketInput) ketInput.value = this.keteranganValues[i] || '';
    }
  },

  updateTextareasFromValues() {
    const taKeg = document.getElementById('paste-kegiatan-textarea');
    const taKet = document.getElementById('paste-keterangan-textarea');
    // Convert internal newline format to semicolon for paste display (one line per student)
    if (taKeg) taKeg.value = this.kegiatanValues.map(v => (v || '').replace(/\n/g, ';')).join('\n');
    if (taKet) taKet.value = this.keteranganValues.map(v => (v || '').replace(/\n/g, ';')).join('\n');
  },

  applyPaste() {
    const taKeg = document.getElementById('paste-kegiatan-textarea');
    const taKet = document.getElementById('paste-keterangan-textarea');
    if (!taKeg || !taKet) return;

    const kegLines = taKeg.value.split('\n');
    const ketLines = taKet.value.split('\n');

    for (let i = 0; i < this.studentList.length; i++) {
      // Convert semicolons to newlines for internal storage
      this.kegiatanValues[i] = (kegLines[i] || '').trim().replace(/;/g, '\n');
      this.keteranganValues[i] = (ketLines[i] || '').trim().replace(/;/g, '\n');
    }
    this.updateTableInputs();

    const filledKeg = kegLines.filter(l => l.trim() !== '').length;
    if (filledKeg > 0 && filledKeg < this.studentList.length) {
      alert('Perhatian: jumlah baris paste kegiatan (' + filledKeg + ') kurang dari jumlah siswa (' + this.studentList.length + '). Baris kosong tidak diisi.');
    }
  },

  onManualKegiatan(index, value) {
    this.kegiatanValues[index] = value;
  },

  onManualKeterangan(index, value) {
    this.keteranganValues[index] = value;
  },

  async saveAll() {
    if (!this.selectedTP || !this.selectedKelas || this.studentList.length === 0) return;

    for (let i = 0; i < this.studentList.length; i++) {
      const kegInput = document.getElementById('ekskul-kegiatan-' + i);
      const ketInput = document.getElementById('ekskul-ket-' + i);
      if (kegInput) this.kegiatanValues[i] = kegInput.value.trim();
      if (ketInput) this.keteranganValues[i] = ketInput.value.trim();
    }

    const kegField = this.selectedSemester === '1' ? 'ekskulKegiatan1' : 'ekskulKegiatan2';
    const ketField = this.selectedSemester === '1' ? 'ekskulKet1' : 'ekskulKet2';
    let savedCount = 0;

    for (let i = 0; i < this.studentList.length; i++) {
      const student = this.studentList[i];
      const nonAkademikArr = await DB.getNonAkademikByAkademik(student.id);
      const existing = nonAkademikArr.length > 0 ? nonAkademikArr[0] : null;

      if (existing) {
        const updated = { ...existing };
        updated[kegField] = this.kegiatanValues[i] || '';
        updated[ketField] = this.keteranganValues[i] || '';
        await DB.updateNonAkademik(updated);
      } else {
        const newRecord = {
          akademikId: student.id,
          ekskulKegiatan1: '',
          ekskulKet1: '',
          ekskulKegiatan2: '',
          ekskulKet2: '',
          sakit1: 0, izin1: 0, alpha1: 0,
          sakit2: 0, izin2: 0, alpha2: 0
        };
        newRecord[kegField] = this.kegiatanValues[i] || '';
        newRecord[ketField] = this.keteranganValues[i] || '';
        await DB.addNonAkademik(newRecord);
      }
      savedCount++;
    }

    alert('Berhasil menyimpan data ekstrakurikuler Semester ' + this.selectedSemester + ' untuk ' + savedCount + ' siswa!');
    await this.loadExisting();
    this.markSavedIndicators();
  },

  markSavedIndicators() {
    for (let i = 0; i < this.studentList.length; i++) {
      const kegInput = document.getElementById('ekskul-kegiatan-' + i);
      const ketInput = document.getElementById('ekskul-ket-' + i);
      if (kegInput && kegInput.value.trim() !== '') {
        kegInput.style.backgroundColor = 'var(--emerald-light)';
      }
      if (ketInput && ketInput.value.trim() !== '') {
        ketInput.style.backgroundColor = 'var(--emerald-light)';
      }
    }
  },

  showRekap() {
    this.showingRekap = true;
    this.render();
    this.loadRekapData();
  },

  hideRekap() {
    this.showingRekap = false;
    this.render();
    if (this.studentList.length > 0) this.loadExisting();
  },

  formatEkskulBullet(kegiatan, keterangan) {
    if (!kegiatan || kegiatan === '-') return '-';
    const kegArr = kegiatan.split('\n').map(k => k.trim()).filter(k => k);
    const ketArr = (keterangan || '').split('\n').map(k => k.trim());
    return kegArr.map((keg, idx) => {
      const ket = ketArr[idx] || '-';
      return '\u2022 ' + escapeHTMLDash(keg) + ': ' + escapeHTMLDash(ket);
    }).join('<br>');
  },

  async loadRekapData() {
    const rekapBody = document.getElementById('ekskul-rekap-tbody');
    if (!rekapBody) return;

    let rows = '';
    for (let i = 0; i < this.studentList.length; i++) {
      const student = this.studentList[i];
      const nonAkademikArr = await DB.getNonAkademikByAkademik(student.id);
      const na = nonAkademikArr.length > 0 ? nonAkademikArr[0] : null;
      const keg1 = na && na.ekskulKegiatan1 ? na.ekskulKegiatan1 : '';
      const ket1 = na && na.ekskulKet1 ? na.ekskulKet1 : '';
      const keg2 = na && na.ekskulKegiatan2 ? na.ekskulKegiatan2 : '';
      const ket2 = na && na.ekskulKet2 ? na.ekskulKet2 : '';
      const sem1Display = this.formatEkskulBullet(keg1, ket1);
      const sem2Display = this.formatEkskulBullet(keg2, ket2);
      rows += '<tr><td>' + (i + 1) + '</td><td>' + escapeHTMLDash(student.nama) + '</td><td>' + sem1Display + '</td><td>' + sem2Display + '</td></tr>';
    }
    rekapBody.innerHTML = rows;
  },

  renderRekapTable() {
    return '<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;"><h3 class="section-title" style="margin-bottom:0;">Rekap Ekstrakurikuler - ' + escapeHTMLDash(this.selectedKelas) + '</h3><button type="button" class="btn btn-outline" onclick="Ekstrakurikuler.hideRekap()">Tutup Rekap</button></div><p class="muted" style="margin-bottom:12px;">' + this.studentList.length + ' siswa (urut alfabet). Data kedua semester ditampilkan.</p><div class="table-container"><table class="data-table"><thead><tr><th style="width:50px;">No</th><th style="min-width:150px;">Nama Siswa</th><th style="min-width:250px;">Ekskul Sem 1</th><th style="min-width:250px;">Ekskul Sem 2</th></tr></thead><tbody id="ekskul-rekap-tbody"><tr><td colspan="4" class="empty-state">Memuat data...</td></tr></tbody></table></div></div>';
  },

  render() {
    const page = document.getElementById('page-ekstrakurikuler');
    const tpList = this.getTPList();
    const kelasList = this.getKelasList();
    this.studentList = this.getStudentsInClass();
    const allSelected = this.selectedTP && this.selectedKelas && this.selectedSemester;
    const showRekapBtn = this.selectedTP && this.selectedKelas && !this.showingRekap;

    page.innerHTML = '<div class="page-header"><h2 class="page-title">Ekstrakurikuler</h2></div>' +
      '<div class="card" style="margin-bottom:16px;"><div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;">' +
      '<div class="form-group" style="margin-bottom:0;min-width:180px;"><label>Tahun Pelajaran</label><select id="ekskul-tp" onchange="Ekstrakurikuler.onTPChange(this.value)"><option value="">-- Pilih TP --</option>' + tpList.map(tp => '<option value="' + escapeHTMLDash(tp) + '"' + (this.selectedTP === tp ? ' selected' : '') + '>' + escapeHTMLDash(tp) + '</option>').join('') + '</select></div>' +
      '<div class="form-group" style="margin-bottom:0;min-width:180px;"><label>Kelas</label><select id="ekskul-kelas" onchange="Ekstrakurikuler.onKelasChange(this.value)" ' + (!this.selectedTP ? 'disabled' : '') + '><option value="">-- Pilih Kelas --</option>' + kelasList.map(k => '<option value="' + escapeHTMLDash(k) + '"' + (this.selectedKelas === k ? ' selected' : '') + '>' + escapeHTMLDash(k) + '</option>').join('') + '</select></div>' +
      '<div class="form-group" style="margin-bottom:0;min-width:150px;"><label>Semester</label><select id="ekskul-semester" onchange="Ekstrakurikuler.onSemesterChange(this.value)" ' + (!this.selectedKelas ? 'disabled' : '') + '><option value="1" ' + (this.selectedSemester === '1' ? 'selected' : '') + '>Semester 1</option><option value="2" ' + (this.selectedSemester === '2' ? 'selected' : '') + '>Semester 2</option></select></div>' +
      (showRekapBtn ? '<div style="margin-bottom:0;"><button type="button" class="btn btn-outline" onclick="Ekstrakurikuler.showRekap()" style="margin-top:20px;">Lihat Rekap Ekskul</button></div>' : '') +
      '</div></div>' +
      (this.showingRekap ? this.renderRekapTable() : (allSelected && this.studentList.length > 0 ? this.renderInputArea() : this.renderPlaceholder()));

    if (!this.showingRekap && allSelected && this.studentList.length > 0) {
      this.updateTableInputs();
      this.updateTextareasFromValues();
    }
  },

  renderPlaceholder() {
    if (this.selectedTP && this.selectedKelas && this.studentList.length === 0) {
      return '<div class="card"><p class="muted">Tidak ada siswa di kelas ini. Tambahkan data akademik terlebih dahulu.</p></div>';
    }
    return '<div class="card"><p class="muted">Pilih Tahun Pelajaran, Kelas, dan Semester untuk mulai input ekstrakurikuler.</p></div>';
  },

  renderInputArea() {
    const semLabel = this.selectedSemester === '1' ? 'Semester 1' : 'Semester 2';
    return '<div class="card" style="margin-bottom:16px;"><h3 class="section-title">Paste Batch - ' + escapeHTMLDash(semLabel) + '</h3><p class="muted" style="margin-bottom:12px;">Paste daftar kegiatan dan keterangan (satu baris per siswa, ' + this.studentList.length + ' baris urut alfabet). Jika siswa punya lebih dari 1 ekskul, pisahkan dengan titik koma (;).</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;"><div class="form-group" style="margin-bottom:0;"><label>Paste Kegiatan</label><textarea id="paste-kegiatan-textarea" rows="6" style="width:100%;font-family:monospace;font-size:13px;padding:10px;border:1px solid var(--border-color);border-radius:8px;resize:vertical;" placeholder="Pramuka;Volly\nPMR\nPaskibra;Futsal\n..."></textarea></div><div class="form-group" style="margin-bottom:0;"><label>Paste Keterangan</label><textarea id="paste-keterangan-textarea" rows="6" style="width:100%;font-family:monospace;font-size:13px;padding:10px;border:1px solid var(--border-color);border-radius:8px;resize:vertical;" placeholder="Mampu baris-berbaris;Teknik dasar voli\nTerampil P3K\nDisiplin gerak;Teknik passing\n..."></textarea></div></div><button type="button" class="btn btn-outline" onclick="Ekstrakurikuler.applyPaste()" style="margin-top:12px;">Terapkan dari Paste</button></div>' +
    '<div class="card"><h3 class="section-title">Data Ekstrakurikuler - ' + escapeHTMLDash(this.selectedKelas) + ' (' + escapeHTMLDash(semLabel) + ')</h3><p class="muted" style="margin-bottom:12px;">' + this.studentList.length + ' siswa (urut alfabet). Edit langsung di kolom tabel, satu kegiatan per baris.</p><div class="table-container"><table class="data-table"><thead><tr><th style="width:50px;">No</th><th style="min-width:150px;">Nama Siswa</th><th style="min-width:200px;">Kegiatan Ekstrakurikuler</th><th style="min-width:200px;">Keterangan</th></tr></thead><tbody>' + this.studentList.map((s, i) => '<tr><td>' + (i + 1) + '</td><td>' + escapeHTMLDash(s.nama) + '</td><td><textarea class="input-md" id="ekskul-kegiatan-' + i + '" rows="3" style="resize:vertical;min-height:50px;" onchange="Ekstrakurikuler.onManualKegiatan(' + i + ', this.value)" placeholder="Satu per baris"></textarea></td><td><textarea class="input-md" id="ekskul-ket-' + i + '" rows="3" style="resize:vertical;min-height:50px;" onchange="Ekstrakurikuler.onManualKeterangan(' + i + ', this.value)" placeholder="Satu per baris"></textarea></td></tr>').join('') + '</tbody></table></div><div class="form-actions" style="margin-top:16px;"><button type="button" class="btn btn-primary" onclick="Ekstrakurikuler.saveAll()">Simpan Semua</button></div></div>';
  }
};
  </script>


  <!-- ketidakhadiran.js -->
  <script>
const Ketidakhadiran = {
  allAkademik: [],
  students: [],
  selectedTP: '',
  selectedKelas: '',
  selectedSemester: '1',
  studentList: [],
  sakitValues: [],
  izinValues: [],
  alphaValues: [],
  showingRekap: false,

  async init() { await this.loadData(); this.render(); },

  async loadData() {

    this.allAkademik = await DB.getAllAkademik();
  },

  getTPList() {

    this.allAkademik.forEach(a => { if (a.tahunPelajaran) s.add(a.tahunPelajaran); });

  },

    return [...s].sort();
  },

  getStudentsInClass() {
    if (!this.selectedTP || !this.selectedKelas) return [];
    const akademikInClass = this.allAkademik.filter(a => a.tahunPelajaran === this.selectedTP && a.kelas === this.selectedKelas);
    const uniqueByNIS = {};
    akademikInClass.forEach(a => { uniqueByNIS[a.nis] = a; });
    return Object.values(uniqueByNIS).map(a => {
      const siswa = this.students.find(s => s.nis === a.nis);
      return { ...a, nama: siswa ? siswa.nama : a.nis, nisn: siswa ? siswa.nisn : '' };
    }).sort((a, b) => a.nama.localeCompare(b.nama));
  },

  onTPChange(val) {
    this.selectedTP = val;
    this.selectedKelas = '';
    this.studentList = [];
    this.sakitValues = [];
    this.izinValues = [];
    this.alphaValues = [];
    this.showingRekap = false;
    this.render();
  },

  onKelasChange(val) {
    this.selectedKelas = val;
    this.studentList = this.getStudentsInClass();
    this.sakitValues = this.studentList.map(() => 0);
    this.izinValues = this.studentList.map(() => 0);
    this.alphaValues = this.studentList.map(() => 0);
    this.showingRekap = false;
    this.render();
    if (this.studentList.length > 0) this.loadExisting();
  },

  onSemesterChange(val) {
    this.selectedSemester = val;
    this.sakitValues = this.studentList.map(() => 0);
    this.izinValues = this.studentList.map(() => 0);
    this.alphaValues = this.studentList.map(() => 0);
    this.showingRekap = false;
    this.render();
    if (this.studentList.length > 0) this.loadExisting();
  },

  async loadExisting() {
    if (!this.selectedTP || !this.selectedKelas || this.studentList.length === 0) return;
    const sakitField = this.selectedSemester === '1' ? 'sakit1' : 'sakit2';
    const izinField = this.selectedSemester === '1' ? 'izin1' : 'izin2';
    const alphaField = this.selectedSemester === '1' ? 'alpha1' : 'alpha2';

    for (let i = 0; i < this.studentList.length; i++) {
      const student = this.studentList[i];
      const nonAkademikArr = await DB.getNonAkademikByAkademik(student.id);
      const na = nonAkademikArr.length > 0 ? nonAkademikArr[0] : null;
      this.sakitValues[i] = na ? (na[sakitField] || 0) : 0;
      this.izinValues[i] = na ? (na[izinField] || 0) : 0;
      this.alphaValues[i] = na ? (na[alphaField] || 0) : 0;
    }
    this.updateTableInputs();
    this.updateTextareasFromValues();
  },

  updateTableInputs() {
    for (let i = 0; i < this.studentList.length; i++) {
      const sakitInput = document.getElementById('hadir-sakit-' + i);
      const izinInput = document.getElementById('hadir-izin-' + i);
      const alphaInput = document.getElementById('hadir-alpha-' + i);
      if (sakitInput) sakitInput.value = this.sakitValues[i] || 0;
      if (izinInput) izinInput.value = this.izinValues[i] || 0;
      if (alphaInput) alphaInput.value = this.alphaValues[i] || 0;
    }
  },

  updateTextareasFromValues() {
    const taSakit = document.getElementById('paste-sakit-textarea');
    const taIzin = document.getElementById('paste-izin-textarea');
    const taAlpha = document.getElementById('paste-alpha-textarea');
    if (taSakit) taSakit.value = this.sakitValues.map(v => v || 0).join('\n');
    if (taIzin) taIzin.value = this.izinValues.map(v => v || 0).join('\n');
    if (taAlpha) taAlpha.value = this.alphaValues.map(v => v || 0).join('\n');
  },

  applyPaste() {
    const taSakit = document.getElementById('paste-sakit-textarea');
    const taIzin = document.getElementById('paste-izin-textarea');
    const taAlpha = document.getElementById('paste-alpha-textarea');
    if (!taSakit || !taIzin || !taAlpha) return;

    const sakitLines = taSakit.value.split('\n');
    const izinLines = taIzin.value.split('\n');
    const alphaLines = taAlpha.value.split('\n');

    for (let i = 0; i < this.studentList.length; i++) {
      this.sakitValues[i] = parseInt(sakitLines[i]) || 0;
      this.izinValues[i] = parseInt(izinLines[i]) || 0;
      this.alphaValues[i] = parseInt(alphaLines[i]) || 0;
    }
    this.updateTableInputs();
  },

  onManualSakit(index, value) { this.sakitValues[index] = parseInt(value) || 0; },
  onManualIzin(index, value) { this.izinValues[index] = parseInt(value) || 0; },
  onManualAlpha(index, value) { this.alphaValues[index] = parseInt(value) || 0; },

  async saveAll() {
    if (!this.selectedTP || !this.selectedKelas || this.studentList.length === 0) return;

    for (let i = 0; i < this.studentList.length; i++) {
      const sakitInput = document.getElementById('hadir-sakit-' + i);
      const izinInput = document.getElementById('hadir-izin-' + i);
      const alphaInput = document.getElementById('hadir-alpha-' + i);
      if (sakitInput) this.sakitValues[i] = parseInt(sakitInput.value) || 0;
      if (izinInput) this.izinValues[i] = parseInt(izinInput.value) || 0;
      if (alphaInput) this.alphaValues[i] = parseInt(alphaInput.value) || 0;
    }

    const sakitField = this.selectedSemester === '1' ? 'sakit1' : 'sakit2';
    const izinField = this.selectedSemester === '1' ? 'izin1' : 'izin2';
    const alphaField = this.selectedSemester === '1' ? 'alpha1' : 'alpha2';
    let savedCount = 0;

    for (let i = 0; i < this.studentList.length; i++) {
      const student = this.studentList[i];
      const nonAkademikArr = await DB.getNonAkademikByAkademik(student.id);
      const existing = nonAkademikArr.length > 0 ? nonAkademikArr[0] : null;

      if (existing) {
        const updated = { ...existing };
        updated[sakitField] = this.sakitValues[i];
        updated[izinField] = this.izinValues[i];
        updated[alphaField] = this.alphaValues[i];
        await DB.updateNonAkademik(updated);
      } else {
        const newRecord = {
          akademikId: student.id,
          ekskulKegiatan1: '',
          ekskulKet1: '',
          ekskulKegiatan2: '',
          ekskulKet2: '',
          sakit1: 0, izin1: 0, alpha1: 0,
          sakit2: 0, izin2: 0, alpha2: 0
        };
        newRecord[sakitField] = this.sakitValues[i];
        newRecord[izinField] = this.izinValues[i];
        newRecord[alphaField] = this.alphaValues[i];
        await DB.addNonAkademik(newRecord);
      }
      savedCount++;
    }

    alert('Berhasil menyimpan data ketidakhadiran Semester ' + this.selectedSemester + ' untuk ' + savedCount + ' siswa!');
    await this.loadExisting();
    this.markSavedIndicators();
  },

  markSavedIndicators() {
    for (let i = 0; i < this.studentList.length; i++) {
      const sakitInput = document.getElementById('hadir-sakit-' + i);
      const izinInput = document.getElementById('hadir-izin-' + i);
      const alphaInput = document.getElementById('hadir-alpha-' + i);
      if (sakitInput) sakitInput.style.backgroundColor = 'var(--emerald-light)';
      if (izinInput) izinInput.style.backgroundColor = 'var(--emerald-light)';
      if (alphaInput) alphaInput.style.backgroundColor = 'var(--emerald-light)';
    }
  },

  showRekap() {
    this.showingRekap = true;
    this.render();
    this.loadRekapData();
  },

  hideRekap() {
    this.showingRekap = false;
    this.render();
    if (this.studentList.length > 0) this.loadExisting();
  },

  async loadRekapData() {
    const rekapBody = document.getElementById('hadir-rekap-tbody');
    if (!rekapBody) return;

    let rows = '';
    for (let i = 0; i < this.studentList.length; i++) {
      const student = this.studentList[i];
      const nonAkademikArr = await DB.getNonAkademikByAkademik(student.id);
      const na = nonAkademikArr.length > 0 ? nonAkademikArr[0] : null;
      const s1 = na ? (na.sakit1 || 0) : 0;
      const i1 = na ? (na.izin1 || 0) : 0;
      const a1 = na ? (na.alpha1 || 0) : 0;
      const s2 = na ? (na.sakit2 || 0) : 0;
      const i2 = na ? (na.izin2 || 0) : 0;
      const a2 = na ? (na.alpha2 || 0) : 0;
      rows += '<tr><td>' + (i + 1) + '</td><td>' + escapeHTMLDash(student.nama) + '</td><td class="center">' + s1 + '</td><td class="center">' + i1 + '</td><td class="center">' + a1 + '</td><td class="center">' + s2 + '</td><td class="center">' + i2 + '</td><td class="center">' + a2 + '</td></tr>';
    }
    rekapBody.innerHTML = rows;
  },

  renderRekapTable() {
    return '<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;"><h3 class="section-title" style="margin-bottom:0;">Rekap Kehadiran - ' + escapeHTMLDash(this.selectedKelas) + '</h3><button type="button" class="btn btn-outline" onclick="Ketidakhadiran.hideRekap()">Tutup Rekap</button></div><p class="muted" style="margin-bottom:12px;">' + this.studentList.length + ' siswa (urut alfabet). Data kedua semester ditampilkan.</p><div class="table-container"><table class="data-table"><thead><tr><th style="width:50px;">No</th><th style="min-width:150px;">Nama Siswa</th><th>S1-Sakit</th><th>S1-Izin</th><th>S1-Alpha</th><th>S2-Sakit</th><th>S2-Izin</th><th>S2-Alpha</th></tr></thead><tbody id="hadir-rekap-tbody"><tr><td colspan="8" class="empty-state">Memuat data...</td></tr></tbody></table></div></div>';
  },

  render() {
    const page = document.getElementById('page-ketidakhadiran');
    const tpList = this.getTPList();
    const kelasList = this.getKelasList();
    this.studentList = this.getStudentsInClass();
    const allSelected = this.selectedTP && this.selectedKelas && this.selectedSemester;
    const showRekapBtn = this.selectedTP && this.selectedKelas && !this.showingRekap;

    page.innerHTML = '<div class="page-header"><h2 class="page-title">Ketidakhadiran</h2></div>' +
      '<div class="card" style="margin-bottom:16px;"><div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;">' +
      '<div class="form-group" style="margin-bottom:0;min-width:180px;"><label>Tahun Pelajaran</label><select id="hadir-tp" onchange="Ketidakhadiran.onTPChange(this.value)"><option value="">-- Pilih TP --</option>' + tpList.map(tp => '<option value="' + escapeHTMLDash(tp) + '"' + (this.selectedTP === tp ? ' selected' : '') + '>' + escapeHTMLDash(tp) + '</option>').join('') + '</select></div>' +
      '<div class="form-group" style="margin-bottom:0;min-width:180px;"><label>Kelas</label><select id="hadir-kelas" onchange="Ketidakhadiran.onKelasChange(this.value)" ' + (!this.selectedTP ? 'disabled' : '') + '><option value="">-- Pilih Kelas --</option>' + kelasList.map(k => '<option value="' + escapeHTMLDash(k) + '"' + (this.selectedKelas === k ? ' selected' : '') + '>' + escapeHTMLDash(k) + '</option>').join('') + '</select></div>' +
      '<div class="form-group" style="margin-bottom:0;min-width:150px;"><label>Semester</label><select id="hadir-semester" onchange="Ketidakhadiran.onSemesterChange(this.value)" ' + (!this.selectedKelas ? 'disabled' : '') + '><option value="1" ' + (this.selectedSemester === '1' ? 'selected' : '') + '>Semester 1</option><option value="2" ' + (this.selectedSemester === '2' ? 'selected' : '') + '>Semester 2</option></select></div>' +
      (showRekapBtn ? '<div style="margin-bottom:0;"><button type="button" class="btn btn-outline" onclick="Ketidakhadiran.showRekap()" style="margin-top:20px;">Lihat Rekap Kehadiran</button></div>' : '') +
      '</div></div>' +
      (this.showingRekap ? this.renderRekapTable() : (allSelected && this.studentList.length > 0 ? this.renderInputArea() : this.renderPlaceholder()));

    if (!this.showingRekap && allSelected && this.studentList.length > 0) {
      this.updateTableInputs();
      this.updateTextareasFromValues();
    }
  },

  renderPlaceholder() {
    if (this.selectedTP && this.selectedKelas && this.studentList.length === 0) {
      return '<div class="card"><p class="muted">Tidak ada siswa di kelas ini. Tambahkan data akademik terlebih dahulu.</p></div>';
    }
    return '<div class="card"><p class="muted">Pilih Tahun Pelajaran, Kelas, dan Semester untuk mulai input ketidakhadiran.</p></div>';
  },

  renderInputArea() {
    const semLabel = this.selectedSemester === '1' ? 'Semester 1' : 'Semester 2';
    return '<div class="card" style="margin-bottom:16px;"><h3 class="section-title">Paste Batch - ' + escapeHTMLDash(semLabel) + '</h3><p class="muted" style="margin-bottom:12px;">Paste jumlah hari (satu angka per baris, ' + this.studentList.length + ' baris urut alfabet).</p><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;"><div class="form-group" style="margin-bottom:0;"><label>Paste Sakit</label><textarea id="paste-sakit-textarea" rows="6" style="width:100%;font-family:monospace;font-size:13px;padding:10px;border:1px solid var(--border-color);border-radius:8px;resize:vertical;" placeholder="2\n0\n1\n..."></textarea></div><div class="form-group" style="margin-bottom:0;"><label>Paste Izin</label><textarea id="paste-izin-textarea" rows="6" style="width:100%;font-family:monospace;font-size:13px;padding:10px;border:1px solid var(--border-color);border-radius:8px;resize:vertical;" placeholder="1\n0\n3\n..."></textarea></div><div class="form-group" style="margin-bottom:0;"><label>Paste Tanpa Keterangan</label><textarea id="paste-alpha-textarea" rows="6" style="width:100%;font-family:monospace;font-size:13px;padding:10px;border:1px solid var(--border-color);border-radius:8px;resize:vertical;" placeholder="0\n1\n0\n..."></textarea></div></div><button type="button" class="btn btn-outline" onclick="Ketidakhadiran.applyPaste()" style="margin-top:12px;">Terapkan dari Paste</button></div>' +
    '<div class="card"><h3 class="section-title">Data Ketidakhadiran - ' + escapeHTMLDash(this.selectedKelas) + ' (' + escapeHTMLDash(semLabel) + ')</h3><p class="muted" style="margin-bottom:12px;">' + this.studentList.length + ' siswa (urut alfabet). Edit langsung di kolom tabel.</p><div class="table-container"><table class="data-table"><thead><tr><th style="width:50px;">No</th><th style="min-width:150px;">Nama Siswa</th><th style="width:120px;">Sakit (Hari)</th><th style="width:120px;">Izin (Hari)</th><th style="width:150px;">Tanpa Keterangan (Hari)</th></tr></thead><tbody>' + this.studentList.map((s, i) => '<tr><td>' + (i + 1) + '</td><td>' + escapeHTMLDash(s.nama) + '</td><td><input type="number" class="input-sm" id="hadir-sakit-' + i + '" min="0" value="0" onchange="Ketidakhadiran.onManualSakit(' + i + ', this.value)"></td><td><input type="number" class="input-sm" id="hadir-izin-' + i + '" min="0" value="0" onchange="Ketidakhadiran.onManualIzin(' + i + ', this.value)"></td><td><input type="number" class="input-sm" id="hadir-alpha-' + i + '" min="0" value="0" onchange="Ketidakhadiran.onManualAlpha(' + i + ', this.value)"></td></tr>').join('') + '</tbody></table></div><div class="form-actions" style="margin-top:16px;"><button type="button" class="btn btn-primary" onclick="Ketidakhadiran.saveAll()">Simpan Semua</button></div></div>';
  }
};
  </script>


  <!-- status-wali.js -->
  <script>
const StatusWali = {
  allAkademik: [],
  students: [],
  selectedTP: '',
  selectedKelas: '',
  studentList: [],
  statusValues: [],
  waliKelas: '',
  showingRekap: false,

  async init() { await this.loadData(); this.render(); },

  async loadData() {
    this.students = await DB.getAllSiswa();
    this.allAkademik = await DB.getAllAkademik();
  },

  getTPList() {
    const s = new Set();
    this.allAkademik.forEach(a => { if (a.tahunPelajaran) s.add(a.tahunPelajaran); });
    return [...s].sort();
  },

  getKelasList() {
    if (!this.selectedTP) return [];
    const s = new Set();
    this.allAkademik.filter(a => a.tahunPelajaran === this.selectedTP).forEach(a => { if (a.kelas) s.add(a.kelas); });
    return [...s].sort();
  },

  getStudentsInClass() {
    if (!this.selectedTP || !this.selectedKelas) return [];
    const akademikInClass = this.allAkademik.filter(a => a.tahunPelajaran === this.selectedTP && a.kelas === this.selectedKelas);
    const uniqueByNIS = {};
    akademikInClass.forEach(a => { uniqueByNIS[a.nis] = a; });
    return Object.values(uniqueByNIS).map(a => {
      const siswa = this.students.find(s => s.nis === a.nis);
      return { ...a, nama: siswa ? siswa.nama : a.nis, nisn: siswa ? siswa.nisn : '' };
    }).sort((a, b) => a.nama.localeCompare(b.nama));
  },

  onTPChange(val) {
    this.selectedTP = val;
    this.selectedKelas = '';
    this.studentList = [];
    this.statusValues = [];
    this.waliKelas = '';
    this.showingRekap = false;
    this.render();
  },

  onKelasChange(val) {
    this.selectedKelas = val;
    this.studentList = this.getStudentsInClass();
    this.statusValues = this.studentList.map(() => '');
    this.waliKelas = '';
    this.showingRekap = false;
    this.render();
    if (this.studentList.length > 0) this.loadExisting();
  },

  async loadExisting() {
    if (!this.selectedTP || !this.selectedKelas || this.studentList.length === 0) return;
    let firstWali = '';
    for (let i = 0; i < this.studentList.length; i++) {
      const student = this.studentList[i];
      const akad = await DB.getAkademik(student.id);
      if (akad) {
        this.statusValues[i] = akad.status || '';
        if (!firstWali && akad.waliKelas) firstWali = akad.waliKelas;
      }
    }
    this.waliKelas = firstWali;
    this.updateUI();
  },

  updateUI() {
    const waliInput = document.getElementById('sw-wali-input');
    if (waliInput) waliInput.value = this.waliKelas;
    for (let i = 0; i < this.studentList.length; i++) {
      const sel = document.getElementById('sw-status-' + i);
      if (sel) sel.value = this.statusValues[i] || '';
    }
  },

  onWaliChange(val) {
    this.waliKelas = val;
  },

  onStatusChange(index, val) {
    this.statusValues[index] = val;
  },

  setAllNaik() {
    for (let i = 0; i < this.studentList.length; i++) {
      this.statusValues[i] = 'Naik';
      const sel = document.getElementById('sw-status-' + i);
      if (sel) sel.value = 'Naik';
    }
  },

  setAllTidakNaik() {
    for (let i = 0; i < this.studentList.length; i++) {
      this.statusValues[i] = 'Tidak Naik';
      const sel = document.getElementById('sw-status-' + i);
      if (sel) sel.value = 'Tidak Naik';
    }
  },

  async saveAll() {
    if (!this.selectedTP || !this.selectedKelas || this.studentList.length === 0) return;
    const waliInput = document.getElementById('sw-wali-input');
    if (waliInput) this.waliKelas = waliInput.value.trim();

    for (let i = 0; i < this.studentList.length; i++) {
      const sel = document.getElementById('sw-status-' + i);
      if (sel) this.statusValues[i] = sel.value;
    }

    let savedCount = 0;
    for (let i = 0; i < this.studentList.length; i++) {
      const student = this.studentList[i];
      const akad = await DB.getAkademik(student.id);
      if (akad) {
        akad.status = this.statusValues[i];
        akad.waliKelas = this.waliKelas;
        await DB.updateAkademik(akad);
        savedCount++;
      }
    }

    // Update local cache
    this.allAkademik = await DB.getAllAkademik();

    // Show green indicator
    for (let i = 0; i < this.studentList.length; i++) {
      const sel = document.getElementById('sw-status-' + i);
      if (sel) sel.style.backgroundColor = 'var(--emerald-light)';
    }
    const waliEl = document.getElementById('sw-wali-input');
    if (waliEl) waliEl.style.backgroundColor = 'var(--emerald-light)';

    const indicator = document.getElementById('sw-save-indicator');
    if (indicator) {
      indicator.style.display = 'inline-block';
      setTimeout(() => { indicator.style.display = 'none'; }, 3000);
    }
  },

  showRekap() {
    this.showingRekap = true;
    this.render();
    this.loadRekapData();
  },

  hideRekap() {
    this.showingRekap = false;
    this.render();
    if (this.studentList.length > 0) this.loadExisting();
  },

  async loadRekapData() {
    const rekapBody = document.getElementById('sw-rekap-tbody');
    if (!rekapBody) return;
    let rows = '';
    for (let i = 0; i < this.studentList.length; i++) {
      const student = this.studentList[i];
      const akad = await DB.getAkademik(student.id);
      const status = akad ? (akad.status || '-') : '-';
      const wali = akad ? (akad.waliKelas || '-') : '-';
      rows += '<tr><td>' + (i + 1) + '</td><td>' + escapeHTMLDash(student.nama) + '</td><td>' + escapeHTMLDash(student.nis) + '</td><td>' + escapeHTMLDash(this.selectedKelas) + '</td><td>' + escapeHTMLDash(status) + '</td><td>' + escapeHTMLDash(wali) + '</td></tr>';
    }
    rekapBody.innerHTML = rows;
  },

  renderRekapTable() {
    return '<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;"><h3 class="section-title" style="margin-bottom:0;">Rekap Status - ' + escapeHTMLDash(this.selectedKelas) + '</h3><button type="button" class="btn btn-outline" onclick="StatusWali.hideRekap()">Tutup Rekap</button></div><p class="muted" style="margin-bottom:12px;">' + this.studentList.length + ' siswa (urut alfabet).</p><div class="table-container"><table class="data-table"><thead><tr><th style="width:50px;">No</th><th>Nama</th><th>NIS</th><th>Kelas</th><th>Status</th><th>Wali Kelas</th></tr></thead><tbody id="sw-rekap-tbody"><tr><td colspan="6" class="empty-state">Memuat data...</td></tr></tbody></table></div></div>';
  },

  render() {
    const page = document.getElementById('page-status-wali');
    const tpList = this.getTPList();
    const kelasList = this.getKelasList();
    this.studentList = this.getStudentsInClass();
    const allSelected = this.selectedTP && this.selectedKelas;
    const showRekapBtn = this.selectedTP && this.selectedKelas && !this.showingRekap;

    page.innerHTML = '<div class="page-header"><h2 class="page-title">Status & Wali Kelas</h2></div>' +
      '<div class="card" style="margin-bottom:16px;"><div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;">' +
      '<div class="form-group" style="margin-bottom:0;min-width:180px;"><label>Tahun Pelajaran</label><select id="sw-tp" onchange="StatusWali.onTPChange(this.value)"><option value="">-- Pilih TP --</option>' + tpList.map(tp => '<option value="' + escapeHTMLDash(tp) + '"' + (this.selectedTP === tp ? ' selected' : '') + '>' + escapeHTMLDash(tp) + '</option>').join('') + '</select></div>' +
      '<div class="form-group" style="margin-bottom:0;min-width:180px;"><label>Kelas</label><select id="sw-kelas" onchange="StatusWali.onKelasChange(this.value)" ' + (!this.selectedTP ? 'disabled' : '') + '><option value="">-- Pilih Kelas --</option>' + kelasList.map(k => '<option value="' + escapeHTMLDash(k) + '"' + (this.selectedKelas === k ? ' selected' : '') + '>' + escapeHTMLDash(k) + '</option>').join('') + '</select></div>' +
      (showRekapBtn ? '<div style="margin-bottom:0;"><button type="button" class="btn btn-outline" onclick="StatusWali.showRekap()" style="margin-top:20px;">Lihat Rekap Status</button></div>' : '') +
      '</div></div>' +
      (this.showingRekap ? this.renderRekapTable() : (allSelected && this.studentList.length > 0 ? this.renderInputArea() : this.renderPlaceholder()));

    if (!this.showingRekap && allSelected && this.studentList.length > 0) {
      this.updateUI();

  },

  renderPlaceholder() {
    if (this.selectedTP && this.selectedKelas && this.studentList.length === 0) {
      return '<div class="card"><p class="muted">Tidak ada siswa di kelas ini. Tambahkan data akademik terlebih dahulu.</p></div>';
    }
    return '<div class="card"><p class="muted">Pilih Tahun Pelajaran dan Kelas untuk mulai mengatur status dan wali kelas.</p></div>';
  },

  renderInputArea() {
    return '<div class="card" style="margin-bottom:16px;"><div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px;">' +
      '<div class="form-group" style="margin-bottom:0;flex:1;min-width:250px;"><label>Wali Kelas (berlaku untuk semua siswa di kelas ini)</label><input type="text" id="sw-wali-input" class="input-md" placeholder="Nama Wali Kelas" value="' + escapeHTMLDash(this.waliKelas) + '" onchange="StatusWali.onWaliChange(this.value)"></div>' +
      '</div>' +
      '<div style="display:flex;gap:8px;margin-bottom:16px;">' +
      '<button type="button" class="btn btn-outline" onclick="StatusWali.setAllNaik()">Set Semua Naik</button>' +
      '<button type="button" class="btn btn-outline" onclick="StatusWali.setAllTidakNaik()">Set Semua Tidak Naik</button>' +
      '</div>' +
      '<h3 class="section-title">Daftar Siswa - ' + escapeHTMLDash(this.selectedKelas) + '</h3>' +
      '<p class="muted" style="margin-bottom:12px;">' + this.studentList.length + ' siswa (urut alfabet).</p>' +
      '<div class="table-container"><table class="data-table"><thead><tr><th style="width:50px;">No</th><th style="min-width:150px;">Nama Siswa</th><th style="width:120px;">NIS</th><th style="width:180px;">Status</th></tr></thead><tbody>' +
      this.studentList.map((s, i) => '<tr><td>' + (i + 1) + '</td><td>' + escapeHTMLDash(s.nama) + '</td><td>' + escapeHTMLDash(s.nis) + '</td><td><select class="input-md" id="sw-status-' + i + '" onchange="StatusWali.onStatusChange(' + i + ', this.value)"><option value="">--</option><option value="Naik">Naik</option><option value="Tidak Naik">Tidak Naik</option></select></td></tr>').join('') +
      '</tbody></table></div>' +
      '<div class="form-actions" style="margin-top:16px;align-items:center;">' +
      '<span id="sw-save-indicator" style="display:none;color:var(--emerald);font-size:13px;font-weight:500;">Berhasil disimpan!</span>' +
