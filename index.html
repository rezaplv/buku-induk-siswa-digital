  },
  renderBiodata(akad) {
    const s = this.studentData;
    return '<h3 class="section-title">Data Biodata Siswa</h3><div class="info-grid"><div class="info-item"><label>Nama</label><p>' + escapeHTML(s.nama) + '</p></div><div class="info-item"><label>NIS</label><p>' + escapeHTML(s.nis) + '</p></div><div class="info-item"><label>NISN</label><p>' + escapeHTML(s.nisn || '-') + '</p></div></div>' + (akad ? '<h3 class="section-title" style="margin-top:24px;">Data Akademik (' + escapeHTML(akad.tahunPelajaran) + ')</h3><div class="info-grid"><div class="info-item"><label>Tahun Pelajaran</label><p>' + escapeHTML(akad.tahunPelajaran) + '</p></div><div class="info-item"><label>Kelas</label><p>' + escapeHTML(akad.kelas) + '</p></div><div class="info-item"><label>Wali Kelas</label><p>' + escapeHTML(akad.waliKelas || '-') + '</p></div><div class="info-item"><label>Status</label><p>' + escapeHTML(akad.status || '-') + '</p></div></div><button class="btn btn-sm btn-outline" style="margin-top:12px;" onclick="StudentDetail.editAkademik()">Edit Data Akademik</button>' : '<p class="muted">Tambahkan data akademik terlebih dahulu.</p>');
  },
  renderNilai(akad) {
    if (!akad) return '<p class="muted">Tambahkan data akademik terlebih dahulu.</p>';
    const nilaiMap = {}; (akad.nilai || []).forEach(n => { nilaiMap[n.mapel] = n; });
    return '<h3 class="section-title">Nilai & Deskripsi</h3><p class="muted">TP: ' + escapeHTML(akad.tahunPelajaran) + ' | Kelas: ' + escapeHTML(akad.kelas) + '</p><form onsubmit="StudentDetail.saveNilai(event)"><div class="table-container"><table class="data-table nilai-table"><thead><tr><th>No</th><th>Mata Pelajaran</th><th>Nilai Sem 1</th><th>Nilai Sem 2</th><th>Deskripsi Sem 1</th><th>Deskripsi Sem 2</th></tr></thead><tbody>' + MATA_PELAJARAN.map((mp, i) => { const n = nilaiMap[mp] || {}; return '<tr><td>' + (i+1) + '</td><td>' + escapeHTML(mp) + '</td><td><input type="number" class="input-sm" name="nilai_sem1_' + i + '" value="' + escapeHTML(n.nilaiSem1 || '') + '" min="0" max="100"></td><td><input type="number" class="input-sm" name="nilai_sem2_' + i + '" value="' + escapeHTML(n.nilaiSem2 || '') + '" min="0" max="100"></td><td><textarea class="input-desc" name="desc_sem1_' + i + '" rows="2">' + escapeHTML(n.deskSem1 || '') + '</textarea></td><td><textarea class="input-desc" name="desc_sem2_' + i + '" rows="2">' + escapeHTML(n.deskSem2 || '') + '</textarea></td></tr>'; }).join('') + '</tbody></table></div><div class="form-actions" style="margin-top:16px;"><button type="submit" class="btn btn-primary">Simpan Nilai</button></div></form>';
  },
  renderEkskul(akad) {
    if (!akad) return '<p class="muted">Tambahkan data akademik terlebih dahulu.</p>';
    const na = akad.nonAkademik || {};
    return '<h3 class="section-title">Ekstrakurikuler</h3><form onsubmit="StudentDetail.saveNonAkademik(event)"><div class="table-container"><table class="data-table"><thead><tr><th>Sem</th><th>Kegiatan</th><th>Keterangan</th></tr></thead><tbody><tr><td>1</td><td><input type="text" class="input-md" name="ekskul_kegiatan_1" value="' + escapeHTML(na.ekskulKegiatan1 || '') + '"></td><td><input type="text" class="input-md" name="ekskul_ket_1" value="' + escapeHTML(na.ekskulKet1 || '') + '"></td></tr><tr><td>2</td><td><input type="text" class="input-md" name="ekskul_kegiatan_2" value="' + escapeHTML(na.ekskulKegiatan2 || '') + '"></td><td><input type="text" class="input-md" name="ekskul_ket_2" value="' + escapeHTML(na.ekskulKet2 || '') + '"></td></tr></tbody></table></div><h3 class="section-title" style="margin-top:24px;">Ketidakhadiran</h3><div class="table-container"><table class="data-table"><thead><tr><th>Sem</th><th>Sakit</th><th>Izin</th><th>Tanpa Ket</th></tr></thead><tbody><tr><td>1</td><td><input type="number" class="input-sm" name="sakit_1" value="' + (na.sakit1 || '') + '" min="0"></td><td><input type="number" class="input-sm" name="izin_1" value="' + (na.izin1 || '') + '" min="0"></td><td><input type="number" class="input-sm" name="alpha_1" value="' + (na.alpha1 || '') + '" min="0"></td></tr><tr><td>2</td><td><input type="number" class="input-sm" name="sakit_2" value="' + (na.sakit2 || '') + '" min="0"></td><td><input type="number" class="input-sm" name="izin_2" value="' + (na.izin2 || '') + '" min="0"></td><td><input type="number" class="input-sm" name="alpha_2" value="' + (na.alpha2 || '') + '" min="0"></td></tr></tbody></table></div><div class="form-actions" style="margin-top:16px;"><button type="submit" class="btn btn-primary">Simpan</button></div></form>';
  },
  renderP5(akad) {
    if (!akad) return '<p class="muted">Tambahkan data akademik terlebih dahulu.</p>';
    const p5 = akad.p5 || {};
    return '<h3 class="section-title">Proyek P5</h3><form onsubmit="StudentDetail.saveP5(event)"><div class="form-group"><label>Catatan P5 Semester 1</label><textarea name="p5_sem1" rows="5">' + escapeHTML(p5.catatanSem1 || '') + '</textarea></div><div class="form-group"><label>Catatan P5 Semester 2</label><textarea name="p5_sem2" rows="5">' + escapeHTML(p5.catatanSem2 || '') + '</textarea></div><div class="form-actions"><button type="submit" class="btn btn-primary">Simpan P5</button></div></form>';
  },
  switchAkademik(id) { this.currentAkademikId = id; this.render(); },
  showAddAkademikModal() { document.getElementById('akademik-modal').style.display = 'flex'; },
  closeAkademikModal() { document.getElementById('akademik-modal').style.display = 'none'; },
  async saveAkademik(event) {
    event.preventDefault();
    const data = { nis: this.nis, tahunPelajaran: document.getElementById('akad-tp').value.trim(), kelas: document.getElementById('akad-kelas').value.trim(), waliKelas: document.getElementById('akad-wali').value.trim(), status: document.getElementById('akad-status').value };
    try { const id = await DB.addAkademik(data); this.currentAkademikId = id; this.closeAkademikModal(); await this.loadData(); this.render(); } catch (e) { alert('Gagal: ' + e.message); }
  },
  async editAkademik() {
    const akad = this.studentData.akademik.find(a => a.id === this.currentAkademikId); if (!akad) return;
    const tp = prompt('Tahun Pelajaran:', akad.tahunPelajaran); if (tp === null) return;
    const kelas = prompt('Kelas:', akad.kelas); if (kelas === null) return;
    const wali = prompt('Wali Kelas:', akad.waliKelas || ''); if (wali === null) return;
    const status = prompt('Status (Naik/Tidak Naik):', akad.status || ''); if (status === null) return;
    try { await DB.updateAkademik({ id: akad.id, nis: this.nis, tahunPelajaran: tp, kelas, waliKelas: wali, status }); await this.loadData(); this.render(); } catch (e) { alert('Gagal: ' + e.message); }
  },
  async saveNilai(event) {
    event.preventDefault(); const form = event.target;
    const akad = this.studentData.akademik.find(a => a.id === this.currentAkademikId); if (!akad) return;
    const newRecords = [];
    for (let i = 0; i < MATA_PELAJARAN.length; i++) {
      const nilaiSem1 = form.elements['nilai_sem1_' + i].value; const nilaiSem2 = form.elements['nilai_sem2_' + i].value;
      newRecords.push({ akademikId: akad.id, mapel: MATA_PELAJARAN[i], nilaiSem1: nilaiSem1 ? parseInt(nilaiSem1) : null, nilaiSem2: nilaiSem2 ? parseInt(nilaiSem2) : null, deskSem1: form.elements['desc_sem1_' + i].value, deskSem2: form.elements['desc_sem2_' + i].value });
    }
    await DB.replaceNilaiByAkademik(akad.id, newRecords); await this.loadData(); this.render(); alert('Nilai berhasil disimpan!');
  },
  async saveNonAkademik(event) {
    event.preventDefault(); const form = event.target;
    const akad = this.studentData.akademik.find(a => a.id === this.currentAkademikId); if (!akad) return;
    const data = { akademikId: akad.id, ekskulKegiatan1: form.elements['ekskul_kegiatan_1'].value, ekskulKet1: form.elements['ekskul_ket_1'].value, ekskulKegiatan2: form.elements['ekskul_kegiatan_2'].value, ekskulKet2: form.elements['ekskul_ket_2'].value, sakit1: parseInt(form.elements['sakit_1'].value) || 0, izin1: parseInt(form.elements['izin_1'].value) || 0, alpha1: parseInt(form.elements['alpha_1'].value) || 0, sakit2: parseInt(form.elements['sakit_2'].value) || 0, izin2: parseInt(form.elements['izin_2'].value) || 0, alpha2: parseInt(form.elements['alpha_2'].value) || 0 };
    await DB.replaceNonAkademikByAkademik(akad.id, [data]); await this.loadData(); this.render(); alert('Data ekskul & absensi berhasil disimpan!');
  },
  async saveP5(event) {
    event.preventDefault(); const form = event.target;
    const akad = this.studentData.akademik.find(a => a.id === this.currentAkademikId); if (!akad) return;
    await DB.replaceP5ByAkademik(akad.id, [{ akademikId: akad.id, catatanSem1: form.elements['p5_sem1'].value, catatanSem2: form.elements['p5_sem2'].value }]);
    await this.loadData(); this.render(); alert('Data P5 berhasil disimpan!');
  },
  async printBukuInduk() {
    await this.loadData();
    const akad = this.studentData.akademik.find(a => a.id === this.currentAkademikId);
    if (!akad) { alert('Pilih tahun pelajaran terlebih dahulu!'); return; }
    PDFGenerator.generate(this.studentData, akad);
  }
};
  </script>


  <!-- data-akademik.js (NEW) - Kelola Mata Pelajaran -->
  <script>
const DataAkademik = {
  mapelList: [],

  init() {
    this.loadMapel();
    this.render();
  },

  loadMapel() {
    const stored = localStorage.getItem('mapelList');
    if (stored) {
      this.mapelList = JSON.parse(stored);
    } else {
      this.mapelList = [
        'Pendidikan Agama dan Budi Pekerti',
        'Pendidikan Pancasila',
        'Bahasa Indonesia',
        'Matematika',
        'IPA',
        'IPS',
        'Bahasa Inggris',
        'PJOK',
        'Informatika',
        'Seni Budaya dan Prakarya',
        'Bahasa Jawa'
      ];
      this.saveMapel();
    }
    if (typeof MATA_PELAJARAN !== 'undefined') {
      MATA_PELAJARAN.length = 0;
      this.mapelList.forEach(m => MATA_PELAJARAN.push(m));
    }
  },

  saveMapel() {
    localStorage.setItem('mapelList', JSON.stringify(this.mapelList));
    if (typeof MATA_PELAJARAN !== 'undefined') {
      MATA_PELAJARAN.length = 0;
      this.mapelList.forEach(m => MATA_PELAJARAN.push(m));
    }
  },

  render() {
    const page = document.getElementById('page-data-akademik');
    page.innerHTML = `
      <div class="page-header">
        <h2 class="page-title">Kelola Mata Pelajaran</h2>
      </div>
      <div class="card">
        <div class="card-header">
          <h3>Daftar Mata Pelajaran (${this.mapelList.length} mapel)</h3>
        </div>
        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th>No</th>
                <th>Nama Mata Pelajaran</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody>
              ${this.mapelList.length === 0 ? '<tr><td colspan="3" class="empty-state">Belum ada mata pelajaran.</td></tr>' :
                this.mapelList.map((m, i) => '<tr><td>' + (i + 1) + '</td><td><strong>' + escapeHTMLDash(m) + '</strong></td><td><button class="btn btn-sm btn-danger" onclick="DataAkademik.deleteMapel(' + i + ')">Hapus</button></td></tr>').join('')}
            </tbody>
          </table>
        </div>
      </div>
      <div class="card">
        <div class="card-header"><h3>Tambah Mata Pelajaran</h3></div>
        
        <!-- Manual (satu per satu) -->
        <form onsubmit="DataAkademik.addMapel(event)" style="display:flex;gap:12px;align-items:flex-end;margin-bottom:16px;">
          <div class="form-group" style="flex:1;margin-bottom:0;">
            <label>Manual (satu per satu)</label>
            <input type="text" id="mapel-input" required placeholder="Contoh: Prakarya dan Kewirausahaan">
          </div>
          <button type="submit" class="btn btn-primary" style="height:42px;">+ Tambah</button>
        </form>
        
        <hr style="margin:16px 0;border:none;border-top:1px solid var(--border-color);">
        
        <!-- Batch (banyak sekaligus) -->
        <div class="form-group">
          <label>Batch (satu mapel per baris)</label>
          <textarea id="mapel-batch-input" rows="6" placeholder="Contoh:\nPrakarya dan Kewirausahaan\nBahasa Arab\nTahfidz\nMuatan Lokal"></textarea>
        </div>
        <div style="display:flex;gap:12px;align-items:center;">
          <button type="button" class="btn btn-primary" onclick="DataAkademik.addMapelBatch()">+ Tambah Semua</button>
          <span id="mapel-batch-count" style="font-size:12px;color:var(--text-muted);"></span>
        </div>
      </div>
      <div class="card" style="margin-top:16px;">
        <p style="font-size:12px;color:var(--text-muted);">
          <strong>Catatan:</strong> Mata pelajaran yang ditambahkan di sini akan muncul di halaman Input Nilai dan Cetak Buku Induk. 
          Menghapus mata pelajaran tidak akan menghapus data nilai yang sudah tersimpan.
        </p>
      </div>
    `;
  },

  addMapel(event) {
    event.preventDefault();
    const input = document.getElementById('mapel-input');
    const nama = input.value.trim();
    if (!nama) { alert('Nama mata pelajaran wajib diisi!'); return; }
    if (this.mapelList.includes(nama)) { alert('Mata pelajaran "' + nama + '" sudah ada!'); return; }
    this.mapelList.push(nama);
    this.saveMapel();
    this.render();
  },

  addMapelBatch() {
    const textarea = document.getElementById('mapel-batch-input');
    const text = textarea.value.trim();
    if (!text) { alert('Masukkan daftar mata pelajaran (satu per baris).'); return; }

    const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
    if (lines.length === 0) { alert('Tidak ada data yang valid.'); return; }

    let added = 0;
    let skipped = 0;
    const skippedNames = [];

    for (const nama of lines) {
      if (this.mapelList.includes(nama)) {
        skipped++;
        skippedNames.push(nama);
      } else {
        this.mapelList.push(nama);
        added++;
      }
    }

    this.saveMapel();
    this.render();

    let msg = 'Berhasil menambahkan ' + added + ' mata pelajaran.';
    if (skipped > 0) {
      msg += '\n\n' + skipped + ' mapel dilewati (sudah ada): ' + skippedNames.join(', ');
    }
    alert(msg);
  },

  deleteMapel(index) {
    const nama = this.mapelList[index];
    if (!confirm('Hapus mata pelajaran "' + nama + '"?')) return;
    this.mapelList.splice(index, 1);
    this.saveMapel();
    this.render();
  }
};
  </script>


  <!-- input-nilai.js (REDESIGNED - paste kolom per mapel per semester) -->
  <script>
const InputNilai = {
  allAkademik: [],
  students: [],
  selectedTP: '',
  selectedKelas: '',
  selectedSemester: '1',
  selectedMapel: '',
  studentList: [],
  nilaiValues: [],
  showingRekap: false,

  async init() { await this.loadData(); this.render(); },
  async loadData() {
    this.students = await DB.getAllSiswa();
    this.allAkademik = await DB.getAllAkademik();
  },
  getTPList() { const s = new Set(); this.allAkademik.forEach(a => { if (a.tahunPelajaran) s.add(a.tahunPelajaran); }); return [...s].sort(); },
  getKelasList() {
    if (!this.selectedTP) return [];
    const s = new Set(); this.allAkademik.filter(a => a.tahunPelajaran === this.selectedTP).forEach(a => { if (a.kelas) s.add(a.kelas); });
    return [...s].sort();
  },
  getStudentsInClass() {
    if (!this.selectedTP || !this.selectedKelas) return [];
    const akademikInClass = this.allAkademik.filter(a => a.tahunPelajaran === this.selectedTP && a.kelas === this.selectedKelas);
    const uniqueByNIS = {};
    akademikInClass.forEach(a => { uniqueByNIS[a.nis] = a; });
    return Object.values(uniqueByNIS).map(a => {
      const siswa = this.students.find(s => s.nis === a.nis);
      return { ...a, nama: siswa ? siswa.nama : a.nis, nisn: siswa ? siswa.nisn : '' };
    }).sort((a, b) => a.nama.localeCompare(b.nama));
  },
  onTPChange(val) { this.selectedTP = val; this.selectedKelas = ''; this.selectedMapel = ''; this.studentList = []; this.nilaiValues = []; this.showingRekap = false; this.render(); },
  onKelasChange(val) { this.selectedKelas = val; this.selectedMapel = ''; this.studentList = this.getStudentsInClass(); this.nilaiValues = []; this.showingRekap = false; this.render(); },
  onSemesterChange(val) { this.selectedSemester = val; this.nilaiValues = []; this.showingRekap = false; this.render(); if (this.selectedMapel) this.loadExistingNilai(); },
  onMapelChange(val) { this.selectedMapel = val; this.nilaiValues = []; this.showingRekap = false; this.render(); if (val) this.loadExistingNilai(); },

  getMapelShortNames() {
    return {
      'Pendidikan Agama dan Budi Pekerti': 'PAI',
      'Pendidikan Pancasila': 'PKn',
      'Bahasa Indonesia': 'B.ID',
      'Matematika': 'MTK',
      'IPA': 'IPA',
      'IPS': 'IPS',
      'Bahasa Inggris': 'B.Ing',
      'PJOK': 'PJOK',
      'Informatika': 'Info',
      'Seni Budaya dan Prakarya': 'SBP',
      'Bahasa Jawa': 'B.Jw'
    };
  },

  async loadExistingNilai() {
    if (!this.selectedMapel || !this.selectedSemester || this.studentList.length === 0) return;
    const field = this.selectedSemester === '1' ? 'nilaiSem1' : 'nilaiSem2';
    const values = [];
    for (const student of this.studentList) {
      const nilaiArr = await DB.getNilaiByAkademik(student.id);
      const found = nilaiArr.find(n => n.mapel === this.selectedMapel);
      values.push(found && found[field] != null ? String(found[field]) : '');
    }
    this.nilaiValues = values;
    this.updateTableInputs();
    this.updateTextareaFromValues();
  },

  updateTableInputs() {
    for (let i = 0; i < this.studentList.length; i++) {
      const input = document.getElementById('nilai-input-' + i);
      if (input) input.value = this.nilaiValues[i] || '';
    }
  },

  updateTextareaFromValues() {
    const ta = document.getElementById('paste-nilai-textarea');
    if (ta) ta.value = this.nilaiValues.join('\n');
  },

  render() {
    const page = document.getElementById('page-input-nilai');
    const tpList = this.getTPList();
    const kelasList = this.getKelasList();
    this.studentList = this.getStudentsInClass();
    const allSelected = this.selectedTP && this.selectedKelas && this.selectedSemester && this.selectedMapel;
    const canShowRekap = this.selectedTP && this.selectedKelas && this.selectedSemester && this.studentList.length > 0;

    page.innerHTML = `
      <div class="page-header"><h2 class="page-title">Input Nilai</h2></div>
      <div class="card" style="margin-bottom:16px;">
        <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;">
          <div class="form-group" style="margin-bottom:0;min-width:180px;">
            <label>Tahun Pelajaran</label>
            <select id="in-tp" onchange="InputNilai.onTPChange(this.value)">
              <option value="">-- Pilih TP --</option>
              ${tpList.map(tp => '<option value="' + escapeHTMLDash(tp) + '"' + (this.selectedTP === tp ? ' selected' : '') + '>' + escapeHTMLDash(tp) + '</option>').join('')}
            </select>
          </div>
          <div class="form-group" style="margin-bottom:0;min-width:180px;">
            <label>Kelas</label>
            <select id="in-kelas" onchange="InputNilai.onKelasChange(this.value)" ${!this.selectedTP ? 'disabled' : ''}>
              <option value="">-- Pilih Kelas --</option>
              ${kelasList.map(k => '<option value="' + escapeHTMLDash(k) + '"' + (this.selectedKelas === k ? ' selected' : '') + '>' + escapeHTMLDash(k) + '</option>').join('')}
            </select>
          </div>
          <div class="form-group" style="margin-bottom:0;min-width:150px;">
            <label>Semester</label>
            <select id="in-semester" onchange="InputNilai.onSemesterChange(this.value)" ${!this.selectedKelas ? 'disabled' : ''}>
              <option value="1" ${this.selectedSemester === '1' ? 'selected' : ''}>Semester 1</option>
              <option value="2" ${this.selectedSemester === '2' ? 'selected' : ''}>Semester 2</option>
            </select>
          </div>
          <div class="form-group" style="margin-bottom:0;min-width:220px;flex:1;">
            <label>Mata Pelajaran</label>
            <select id="in-mapel" onchange="InputNilai.onMapelChange(this.value)" ${!this.selectedKelas ? 'disabled' : ''}>
              <option value="">-- Pilih Mapel --</option>
              ${MATA_PELAJARAN.map(mp => '<option value="' + escapeHTMLDash(mp) + '"' + (this.selectedMapel === mp ? ' selected' : '') + '>' + escapeHTMLDash(mp) + '</option>').join('')}
            </select>
          </div>
        </div>
      </div>
      ${canShowRekap ? '<div style="margin-bottom:16px;"><button type="button" class="btn btn-outline" onclick="InputNilai.showRekap()" id="btn-rekap-kelas"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:6px;"><path d="M3 3h18v18H3z"/><path d="M3 9h18"/><path d="M3 15h18"/><path d="M9 3v18"/></svg>Lihat Rekap Kelas</button></div>' : ''}
      ${this.showingRekap ? '<div id="rekap-kelas-container"></div>' : (allSelected && this.studentList.length > 0 ? this.renderInputArea() : this.renderPlaceholder())}`;

    if (!this.showingRekap && allSelected && this.studentList.length > 0) {
      this.updateTableInputs();
      this.updateTextareaFromValues();
    }
    if (this.showingRekap) {
      this.renderRekapTable();
    }
  },

  renderPlaceholder() {
    if (this.selectedTP && this.selectedKelas && this.studentList.length === 0) {
      return '<div class="card"><p class="muted">Tidak ada siswa di kelas ini. Tambahkan data akademik terlebih dahulu.</p></div>';
    }
    if (!this.selectedMapel && this.selectedKelas) {
      return '<div class="card"><p class="muted">Pilih Mata Pelajaran untuk mulai input nilai.</p></div>';
    }
    return '<div class="card"><p class="muted">Pilih Tahun Pelajaran, Kelas, Semester, dan Mata Pelajaran untuk mulai input nilai.</p></div>';
  },

  renderInputArea() {
    const semLabel = this.selectedSemester === '1' ? 'Semester 1' : 'Semester 2';
    return '<div class="card" style="margin-bottom:16px;"><h3 class="section-title">Paste Nilai - ' + escapeHTMLDash(this.selectedMapel) + ' (' + semLabel + ')</h3><p class="muted" style="margin-bottom:8px;">Copy satu kolom nilai dari Excel (' + this.studentList.length + ' baris, urut alfabet), lalu paste di bawah ini. Satu nilai per baris. Nilai desimal gunakan koma (83,5) atau titik (83.5).</p><textarea id="paste-nilai-textarea" rows="6" style="width:100%;font-family:monospace;font-size:14px;padding:10px;border:1px solid var(--border-color);border-radius:8px;resize:vertical;margin-bottom:12px;" placeholder="Paste ' + this.studentList.length + ' nilai di sini (satu per baris)..."></textarea><button type="button" class="btn btn-outline" onclick="InputNilai.applyPaste()" style="margin-bottom:16px;">Terapkan dari Paste</button></div><div class="card"><h3 class="section-title">Preview Nilai - ' + escapeHTMLDash(this.selectedMapel) + ' (' + semLabel + ')</h3><p class="muted" style="margin-bottom:12px;">' + this.studentList.length + ' siswa (urut alfabet). Edit manual juga bisa langsung di kolom Nilai.</p><div class="table-container"><table class="data-table"><thead><tr><th style="width:50px;">No</th><th>Nama Siswa</th><th style="width:100px;">NIS</th><th style="width:120px;">Nilai</th></tr></thead><tbody>' + this.studentList.map((s, i) => '<tr><td>' + (i + 1) + '</td><td>' + escapeHTMLDash(s.nama) + '</td><td>' + escapeHTMLDash(s.nis) + '</td><td><input type="text" class="input-sm" id="nilai-input-' + i + '" value="" style="width:80px;text-align:center;" onchange="InputNilai.onManualInput(' + i + ', this.value)"></td></tr>').join('') + '</tbody></table></div><div class="form-actions" style="margin-top:16px;"><button type="button" class="btn btn-primary" onclick="InputNilai.saveAll()">Simpan Semua</button><button type="button" class="btn btn-outline" onclick="InputNilai.clearAll()" style="margin-left:8px;">Hapus Semua Nilai</button></div></div>';
  },

  onManualInput(index, value) {
    this.nilaiValues[index] = value.trim();
  },

  applyPaste() {
    const ta = document.getElementById('paste-nilai-textarea');
    if (!ta) return;
    const lines = ta.value.split('\n').map(l => l.trim());
    for (let i = 0; i < this.studentList.length; i++) {
      const raw = (lines[i] || '').replace(',', '.');
      this.nilaiValues[i] = raw;
      const input = document.getElementById('nilai-input-' + i);
      if (input) input.value = raw;
    }
    if (lines.filter(l => l !== '').length < this.studentList.length && lines.filter(l => l !== '').length > 0) {
      alert('Perhatian: jumlah baris paste (' + lines.filter(l => l !== '').length + ') kurang dari jumlah siswa (' + this.studentList.length + '). Baris yang kosong tidak diisi.');
    }
  },

  clearAll() {
    if (!confirm('Hapus semua nilai di tabel?')) return;
    this.nilaiValues = this.studentList.map(() => '');
    this.updateTableInputs();
    const ta = document.getElementById('paste-nilai-textarea');
    if (ta) ta.value = '';
    for (let i = 0; i < this.studentList.length; i++) {
      const input = document.getElementById('nilai-input-' + i);
      if (input) input.style.background = '';
    }
  },

  parseNilai(raw) {
    if (!raw || raw === '') return null;
    const normalized = raw.replace(',', '.');
    const val = parseFloat(normalized);
    if (isNaN(val)) return null;
    return val;
  },

  async saveAll() {
    if (!this.selectedMapel || !this.selectedSemester || this.studentList.length === 0) return;
    for (let i = 0; i < this.studentList.length; i++) {
      const input = document.getElementById('nilai-input-' + i);
      if (input) this.nilaiValues[i] = input.value.trim();
    }
    for (let i = 0; i < this.studentList.length; i++) {
      const raw = this.nilaiValues[i] || '';
      if (raw === '') continue;
      const val = this.parseNilai(raw);
      if (val === null || val < 0 || val > 100) {
        alert('Nilai baris ' + (i + 1) + ' (' + this.studentList[i].nama + ') tidak valid: "' + raw + '". Harus angka 0-100.');
        return;
      }
    }
    const field = this.selectedSemester === '1' ? 'nilaiSem1' : 'nilaiSem2';
    let savedCount = 0;
    for (let i = 0; i < this.studentList.length; i++) {
      const student = this.studentList[i];
      const raw = this.nilaiValues[i] || '';
      const parsedVal = this.parseNilai(raw);
      const nilaiArr = await DB.getNilaiByAkademik(student.id);
      const existing = nilaiArr.find(n => n.mapel === this.selectedMapel);
      if (existing) {
        const updated = { ...existing };
        updated[field] = parsedVal;
        await DB.updateNilai(updated);
      } else {
        const newRecord = { akademikId: student.id, mapel: this.selectedMapel, nilaiSem1: null, nilaiSem2: null, deskSem1: '', deskSem2: '' };
        newRecord[field] = parsedVal;
        await DB.addNilai(newRecord);
      }
      savedCount++;
    }
    alert('Berhasil menyimpan nilai ' + this.selectedMapel + ' (Semester ' + this.selectedSemester + ') untuk ' + savedCount + ' siswa!');
    await this.loadExistingNilai();
    this.markSavedIndicators();
  },

  markSavedIndicators() {
    for (let i = 0; i < this.studentList.length; i++) {
      const input = document.getElementById('nilai-input-' + i);
      if (input && this.nilaiValues[i] !== '') {
        input.style.background = 'var(--emerald-light)';
      }
    }
  },

  async showRekap() {
    this.showingRekap = true;
    this.render();
  },

  hideRekap() {
    this.showingRekap = false;
    this.render();
  },

  async renderRekapTable() {
    const container = document.getElementById('rekap-kelas-container');
    if (!container) return;
    const shortNames = this.getMapelShortNames();
    const semLabel = this.selectedSemester === '1' ? 'Semester 1' : 'Semester 2';
    const field = this.selectedSemester === '1' ? 'nilaiSem1' : 'nilaiSem2';
    const rekapData = [];
    for (const student of this.studentList) {
      const nilaiArr = await DB.getNilaiByAkademik(student.id);
      const nilaiMap = {};
      nilaiArr.forEach(n => { nilaiMap[n.mapel] = n; });
      rekapData.push({ student, nilaiMap });
    }
    let headerCols = '<th style="width:40px;position:sticky;left:0;background:var(--bg-primary);z-index:1;">No</th><th style="min-width:150px;position:sticky;left:40px;background:var(--bg-primary);z-index:1;">Nama Siswa</th><th style="width:80px;">NIS</th>';
    MATA_PELAJARAN.forEach(mp => {
      const short = shortNames[mp] || mp.substring(0, 4);
      headerCols += '<th style="width:50px;text-align:center;font-size:11px;">' + escapeHTMLDash(short) + '</th>';
    });
    let rows = '';
    rekapData.forEach((item, idx) => {
      let cols = '<td style="position:sticky;left:0;background:#fff;z-index:1;">' + (idx + 1) + '</td>';
      cols += '<td style="position:sticky;left:40px;background:#fff;z-index:1;white-space:nowrap;">' + escapeHTMLDash(item.student.nama) + '</td>';
      cols += '<td>' + escapeHTMLDash(item.student.nis) + '</td>';
      MATA_PELAJARAN.forEach(mp => {
        const n = item.nilaiMap[mp];
        const val = n && n[field] != null ? String(n[field]) : '-';
        cols += '<td style="text-align:center;">' + escapeHTMLDash(val) + '</td>';
      });
      rows += '<tr>' + cols + '</tr>';
    });
    container.innerHTML = '<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;"><h3 class="section-title" style="margin-bottom:0;">Rekap Nilai Kelas ' + escapeHTMLDash(this.selectedKelas) + ' - ' + semLabel + '</h3><button type="button" class="btn btn-outline" onclick="InputNilai.hideRekap()">Tutup Rekap</button></div><p class="muted" style="margin-bottom:12px;">Rekap semua mata pelajaran untuk ' + this.studentList.length + ' siswa. Scroll horizontal jika kolom tidak muat.</p><div style="overflow-x:auto;"><table class="data-table" style="min-width:900px;font-size:13px;"><thead><tr>' + headerCols + '</tr></thead><tbody>' + rows + '</tbody></table></div></div>';
  }
};
  </script>



  <!-- ekstrakurikuler.js -->
  <script>
const Ekstrakurikuler = {
  allAkademik: [],
  students: [],
  selectedTP: '',
  selectedKelas: '',
  selectedSemester: '1',
  studentList: [],
  kegiatanValues: [],
  keteranganValues: [],

  async init() { await this.loadData(); this.render(); },

  async loadData() {
    this.students = await DB.getAllSiswa();
    this.allAkademik = await DB.getAllAkademik();
  },

  getTPList() {
    const s = new Set();
    this.allAkademik.forEach(a => { if (a.tahunPelajaran) s.add(a.tahunPelajaran); });
    return [...s].sort();
  },

  getKelasList() {
    if (!this.selectedTP) return [];
    const s = new Set();
    this.allAkademik.filter(a => a.tahunPelajaran === this.selectedTP).forEach(a => { if (a.kelas) s.add(a.kelas); });
    return [...s].sort();
  },

  getStudentsInClass() {
    if (!this.selectedTP || !this.selectedKelas) return [];
    const akademikInClass = this.allAkademik.filter(a => a.tahunPelajaran === this.selectedTP && a.kelas === this.selectedKelas);
    const uniqueByNIS = {};
    akademikInClass.forEach(a => { uniqueByNIS[a.nis] = a; });
    return Object.values(uniqueByNIS).map(a => {
      const siswa = this.students.find(s => s.nis === a.nis);
      return { ...a, nama: siswa ? siswa.nama : a.nis, nisn: siswa ? siswa.nisn : '' };
    }).sort((a, b) => a.nama.localeCompare(b.nama));
  },

  onTPChange(val) {
    this.selectedTP = val;
    this.selectedKelas = '';
    this.studentList = [];
    this.kegiatanValues = [];
    this.keteranganValues = [];
    this.render();
  },

  onKelasChange(val) {
    this.selectedKelas = val;
    this.studentList = this.getStudentsInClass();
    this.kegiatanValues = this.studentList.map(() => '');
    this.keteranganValues = this.studentList.map(() => '');
    this.render();
    if (this.studentList.length > 0) this.loadExisting();
  },

  onSemesterChange(val) {
    this.selectedSemester = val;
    this.kegiatanValues = this.studentList.map(() => '');
    this.keteranganValues = this.studentList.map(() => '');
    this.render();
    if (this.studentList.length > 0) this.loadExisting();
  },

  async loadExisting() {
    if (!this.selectedTP || !this.selectedKelas || this.studentList.length === 0) return;
    const kegField = this.selectedSemester === '1' ? 'ekskulKegiatan1' : 'ekskulKegiatan2';
    const ketField = this.selectedSemester === '1' ? 'ekskulKet1' : 'ekskulKet2';

    for (let i = 0; i < this.studentList.length; i++) {
      const student = this.studentList[i];
      const nonAkademikArr = await DB.getNonAkademikByAkademik(student.id);
      const na = nonAkademikArr.length > 0 ? nonAkademikArr[0] : null;
      this.kegiatanValues[i] = na ? (na[kegField] || '') : '';
      this.keteranganValues[i] = na ? (na[ketField] || '') : '';
    }
    this.updateTableInputs();
    this.updateTextareasFromValues();
  },

  updateTableInputs() {
    for (let i = 0; i < this.studentList.length; i++) {
      const kegInput = document.getElementById('ekskul-kegiatan-' + i);
      const ketInput = document.getElementById('ekskul-ket-' + i);
      if (kegInput) kegInput.value = this.kegiatanValues[i] || '';
      if (ketInput) ketInput.value = this.keteranganValues[i] || '';
    }
  },

  updateTextareasFromValues() {
    const taKeg = document.getElementById('paste-kegiatan-textarea');
    const taKet = document.getElementById('paste-keterangan-textarea');
    if (taKeg) taKeg.value = this.kegiatanValues.join('\n');
    if (taKet) taKet.value = this.keteranganValues.join('\n');
  },

  applyPaste() {
    const taKeg = document.getElementById('paste-kegiatan-textarea');
    const taKet = document.getElementById('paste-keterangan-textarea');
    if (!taKeg || !taKet) return;

    const kegLines = taKeg.value.split('\n');
    const ketLines = taKet.value.split('\n');

    for (let i = 0; i < this.studentList.length; i++) {
      this.kegiatanValues[i] = (kegLines[i] || '').trim();
      this.keteranganValues[i] = (ketLines[i] || '').trim();
    }
    this.updateTableInputs();

    const filledKeg = kegLines.filter(l => l.trim() !== '').length;
    if (filledKeg > 0 && filledKeg < this.studentList.length) {
      alert('Perhatian: jumlah baris paste kegiatan (' + filledKeg + ') kurang dari jumlah siswa (' + this.studentList.length + '). Baris kosong tidak diisi.');
    }
  },

  onManualKegiatan(index, value) {
    this.kegiatanValues[index] = value;
  },

  onManualKeterangan(index, value) {
    this.keteranganValues[index] = value;
  },

  async saveAll() {
    if (!this.selectedTP || !this.selectedKelas || this.studentList.length === 0) return;

    for (let i = 0; i < this.studentList.length; i++) {
      const kegInput = document.getElementById('ekskul-kegiatan-' + i);
      const ketInput = document.getElementById('ekskul-ket-' + i);
      if (kegInput) this.kegiatanValues[i] = kegInput.value.trim();
      if (ketInput) this.keteranganValues[i] = ketInput.value.trim();
    }

    const kegField = this.selectedSemester === '1' ? 'ekskulKegiatan1' : 'ekskulKegiatan2';
    const ketField = this.selectedSemester === '1' ? 'ekskulKet1' : 'ekskulKet2';
    let savedCount = 0;

    for (let i = 0; i < this.studentList.length; i++) {
      const student = this.studentList[i];
      const nonAkademikArr = await DB.getNonAkademikByAkademik(student.id);
      const existing = nonAkademikArr.length > 0 ? nonAkademikArr[0] : null;

      if (existing) {
        const updated = { ...existing };
        updated[kegField] = this.kegiatanValues[i] || '';
        updated[ketField] = this.keteranganValues[i] || '';
        await DB.updateNonAkademik(updated);
      } else {
        const newRecord = {
          akademikId: student.id,
          ekskulKegiatan1: '',
          ekskulKet1: '',
          ekskulKegiatan2: '',
          ekskulKet2: '',
          sakit1: 0, izin1: 0, alpha1: 0,
          sakit2: 0, izin2: 0, alpha2: 0
        };
        newRecord[kegField] = this.kegiatanValues[i] || '';
        newRecord[ketField] = this.keteranganValues[i] || '';
        await DB.addNonAkademik(newRecord);
      }
      savedCount++;
    }

    alert('Berhasil menyimpan data ekstrakurikuler Semester ' + this.selectedSemester + ' untuk ' + savedCount + ' siswa!');
    await this.loadExisting();
  },

  render() {
    const page = document.getElementById('page-ekstrakurikuler');
    const tpList = this.getTPList();
    const kelasList = this.getKelasList();
    this.studentList = this.getStudentsInClass();
    const allSelected = this.selectedTP && this.selectedKelas && this.selectedSemester;

    page.innerHTML = `
      <div class="page-header"><h2 class="page-title">Ekstrakurikuler</h2></div>
      <div class="card" style="margin-bottom:16px;">
        <div style="display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;">
          <div class="form-group" style="margin-bottom:0;min-width:180px;">
            <label>Tahun Pelajaran</label>
            <select id="ekskul-tp" onchange="Ekstrakurikuler.onTPChange(this.value)">
              <option value="">-- Pilih TP --</option>
              ${tpList.map(tp => '<option value="' + escapeHTMLDash(tp) + '"' + (this.selectedTP === tp ? ' selected' : '') + '>' + escapeHTMLDash(tp) + '</option>').join('')}
            </select>
          </div>
          <div class="form-group" style="margin-bottom:0;min-width:180px;">
            <label>Kelas</label>
            <select id="ekskul-kelas" onchange="Ekstrakurikuler.onKelasChange(this.value)" ${!this.selectedTP ? 'disabled' : ''}>
              <option value="">-- Pilih Kelas --</option>
              ${kelasList.map(k => '<option value="' + escapeHTMLDash(k) + '"' + (this.selectedKelas === k ? ' selected' : '') + '>' + escapeHTMLDash(k) + '</option>').join('')}
            </select>
          </div>
          <div class="form-group" style="margin-bottom:0;min-width:150px;">
            <label>Semester</label>
            <select id="ekskul-semester" onchange="Ekstrakurikuler.onSemesterChange(this.value)" ${!this.selectedKelas ? 'disabled' : ''}>
              <option value="1" ${this.selectedSemester === '1' ? 'selected' : ''}>Semester 1</option>
              <option value="2" ${this.selectedSemester === '2' ? 'selected' : ''}>Semester 2</option>
            </select>
          </div>
        </div>
      </div>
      ${allSelected && this.studentList.length > 0 ? this.renderInputArea() : this.renderPlaceholder()}`;

    if (allSelected && this.studentList.length > 0) {
      this.updateTableInputs();
      this.updateTextareasFromValues();
    }
  },

  renderPlaceholder() {
    if (this.selectedTP && this.selectedKelas && this.studentList.length === 0) {
      return '<div class="card"><p class="muted">Tidak ada siswa di kelas ini. Tambahkan data akademik terlebih dahulu.</p></div>';
    }
    return '<div class="card"><p class="muted">Pilih Tahun Pelajaran, Kelas, dan Semester untuk mulai input ekstrakurikuler.</p></div>';
  },

  renderInputArea() {
    const semLabel = this.selectedSemester === '1' ? 'Semester 1' : 'Semester 2';
    return '<div class="card" style="margin-bottom:16px;"><h3 class="section-title">Paste Batch - ' + escapeHTMLDash(semLabel) + '</h3><p class="muted" style="margin-bottom:12px;">Paste daftar kegiatan dan keterangan (satu baris per siswa, ' + this.studentList.length + ' baris urut alfabet). Jika siswa punya lebih dari 1 ekskul, pisahkan dengan koma.</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;"><div class="form-group" style="margin-bottom:0;"><label>Paste Kegiatan</label><textarea id="paste-kegiatan-textarea" rows="6" style="width:100%;font-family:monospace;font-size:13px;padding:10px;border:1px solid var(--border-color);border-radius:8px;resize:vertical;" placeholder="Pramuka, Volly\nPMR\nPaskibra, Futsal\n..."></textarea></div><div class="form-group" style="margin-bottom:0;"><label>Paste Keterangan</label><textarea id="paste-keterangan-textarea" rows="6" style="width:100%;font-family:monospace;font-size:13px;padding:10px;border:1px solid var(--border-color);border-radius:8px;resize:vertical;" placeholder="Mampu baris-berbaris, Teknik dasar voli\nTerampil P3K\nDisiplin gerak, Teknik passing\n..."></textarea></div></div><button type="button" class="btn btn-outline" onclick="Ekstrakurikuler.applyPaste()" style="margin-top:12px;">Terapkan dari Paste</button></div><div class="card"><h3 class="section-title">Data Ekstrakurikuler - ' + escapeHTMLDash(this.selectedKelas) + ' (' + escapeHTMLDash(semLabel) + ')</h3><p class="muted" style="margin-bottom:12px;">' + this.studentList.length + ' siswa (urut alfabet). Bisa juga edit langsung di kolom tabel.</p><div class="table-container"><table class="data-table"><thead><tr><th style="width:50px;">No</th><th style="min-width:150px;">Nama Siswa</th><th style="min-width:200px;">Kegiatan Ekstrakurikuler</th><th style="min-width:200px;">Keterangan</th></tr></thead><tbody>' + this.studentList.map((s, i) => '<tr><td>' + (i + 1) + '</td><td>' + escapeHTMLDash(s.nama) + '</td><td><textarea class="input-md" id="ekskul-kegiatan-' + i + '" rows="2" style="resize:vertical;min-height:40px;" onchange="Ekstrakurikuler.onManualKegiatan(' + i + ', this.value)" placeholder="Pramuka, Volly"></textarea></td><td><textarea class="input-md" id="ekskul-ket-' + i + '" rows="2" style="resize:vertical;min-height:40px;" onchange="Ekstrakurikuler.onManualKeterangan(' + i + ', this.value)" placeholder="Keterangan per kegiatan"></textarea></td></tr>').join('') + '</tbody></table></div><div class="form-actions" style="margin-top:16px;"><button type="button" class="btn btn-primary" onclick="Ekstrakurikuler.saveAll()">Simpan Semua</button></div></div>';
  }
};
  </script>


  <!-- import-data.js -->
  <script>
const ImportData = {
  parsedData: null, importType: 'siswa', fileName: '',
  init() { this.render(); },
  render() {
    const page = document.getElementById('page-import-data-file');
    page.innerHTML = `
      <div class="page-header"><h2 class="page-title">Import Data</h2></div>
      <div class="card"><div class="card-header"><h3>Upload File</h3></div><div class="import-section">
        <div class="form-group"><label>Jenis Data</label><select id="import-type" onchange="ImportData.importType = this.value"><option value="siswa">Data Siswa (Nama, NIS, NISN)</option><option value="nilai">Nilai</option><option value="akademik">Data Akademik</option><option value="nonakademik">Ekskul & Absensi</option></select></div>
        <div class="upload-area" id="upload-area" ondragover="ImportData.handleDragOver(event)" ondrop="ImportData.handleDrop(event)" ondragleave="ImportData.handleDragLeave(event)">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#94A3B8" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
          <p class="upload-text">Drag & drop file CSV di sini</p><p class="upload-hint">atau</p>
          <label class="btn btn-outline upload-btn">Pilih File<input type="file" accept=".csv,.xlsx,.xls" onchange="ImportData.handleFileSelect(event)" style="display:none;"></label>
          <p class="upload-format">Format: CSV, XLSX</p>
          ${this.fileName ? '<p class="upload-filename">File: ' + this.fileName + '</p>' : ''}
        </div>
      </div></div>
      ${this.parsedData ? this.renderPreview() : ''}
      <div id="import-results"></div>`;
  },
  renderPreview() {
    const data = this.parsedData; if (!data || data.length === 0) return '<div class="card"><p>Tidak ada data.</p></div>';
    const headers = Object.keys(data[0]); const preview = data.slice(0, 10);
    return '<div class="card" style="margin-top:16px;"><div class="card-header"><h3>Preview (' + data.length + ' baris)</h3><button class="btn btn-primary" onclick="ImportData.doImport()">Import ' + data.length + ' Data</button></div><div class="table-container"><table class="data-table"><thead><tr>' + headers.map(h => '<th>' + h + '</th>').join('') + '</tr></thead><tbody>' + preview.map(row => '<tr>' + headers.map(h => '<td>' + (row[h] || '') + '</td>').join('') + '</tr>').join('') + (data.length > 10 ? '<tr><td colspan="' + headers.length + '" class="muted" style="text-align:center;">... dan ' + (data.length - 10) + ' baris lainnya</td></tr>' : '') + '</tbody></table></div></div>';
  },
  handleDragOver(event) { event.preventDefault(); document.getElementById('upload-area').classList.add('drag-over'); },
  handleDragLeave(event) { event.preventDefault(); document.getElementById('upload-area').classList.remove('drag-over'); },
  handleDrop(event) { event.preventDefault(); document.getElementById('upload-area').classList.remove('drag-over'); if (event.dataTransfer.files.length > 0) this.processFile(event.dataTransfer.files[0]); },
  handleFileSelect(event) { if (event.target.files.length > 0) this.processFile(event.target.files[0]); },
  processFile(file) {
    this.fileName = file.name; const ext = file.name.split('.').pop().toLowerCase();
    if (ext === 'xlsx' || ext === 'xls') { XLSXParser.parse(file).then(data => { if (data) { this.parsedData = data; this.render(); } }).catch(() => { alert('Simpan sebagai CSV terlebih dahulu.'); this.render(); }); }
    else if (ext === 'csv') { const reader = new FileReader(); reader.onload = (e) => { this.parsedData = CSVParser.parse(e.target.result); this.render(); }; reader.readAsText(file); }
    else { alert('Format tidak didukung.'); }
  },
  async doImport() {
    if (!this.parsedData || this.parsedData.length === 0) { alert('Tidak ada data.'); return; }
    const resultsDiv = document.getElementById('import-results');
    resultsDiv.innerHTML = '<div class="card"><p>Mengimport data...</p><div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div></div>';
    let results;
    try {
      switch (this.importType) {
        case 'siswa': results = await this.importSiswa(); break;
        case 'nilai': results = await this.importNilai(); break;
        case 'akademik': results = await this.importAkademik(); break;
        case 'nonakademik': results = await this.importNonAkademik(); break;
        default: results = { success: 0, failed: 0, errors: [] };
      }
      resultsDiv.innerHTML = '<div class="card" style="margin-top:16px;"><div class="card-header"><h3>Hasil Import</h3></div><div class="import-results-summary"><div class="result-item success"><strong>' + results.success + '</strong> berhasil</div><div class="result-item failed"><strong>' + results.failed + '</strong> gagal</div></div>' + (results.errors.length > 0 ? '<div class="error-list"><h4>Error:</h4><ul>' + results.errors.slice(0, 10).map(e => '<li>' + JSON.stringify(e) + '</li>').join('') + '</ul></div>' : '') + '</div>';
    } catch (e) { resultsDiv.innerHTML = '<div class="card"><p style="color:#DC2626;">Import gagal: ' + e.message + '</p></div>'; }
  },
  async importSiswa() {
    const results = { success: 0, failed: 0, errors: [] };
    for (const row of this.parsedData) {
      const nama = row['Nama'] || row['nama'] || row['NAMA'] || row['Nama Peserta Didik'] || '';
      const nis = row['NIS'] || row['nis'] || ''; const nisn = row['NISN'] || row['nisn'] || '';
      if (!nama || !nis) { results.failed++; results.errors.push({ row, error: 'Nama/NIS kosong' }); continue; }
      try { await DB.addSiswa({ nama: nama.trim(), nis: nis.toString().trim(), nisn: nisn.toString().trim() }); results.success++; }
      catch (e) { try { await DB.updateSiswa({ nama: nama.trim(), nis: nis.toString().trim(), nisn: nisn.toString().trim() }); results.success++; } catch (e2) { results.failed++; results.errors.push({ row, error: e2.message }); } }
    }
    return results;
  },
  async importAkademik() {
    const results = { success: 0, failed: 0, errors: [] };
    for (const row of this.parsedData) {
      const nis = (row['NIS'] || row['nis'] || '').toString().trim(); const tp = row['Tahun Pelajaran'] || row['tahunPelajaran'] || row['TP'] || '';
      const kelas = row['Kelas'] || row['kelas'] || ''; const wali = row['Wali Kelas'] || row['waliKelas'] || ''; const status = row['Status'] || row['status'] || '';
      if (!nis || !tp) { results.failed++; results.errors.push({ row, error: 'NIS/TP kosong' }); continue; }
      try { await DB.addAkademik({ nis, tahunPelajaran: tp, kelas, waliKelas: wali, status }); results.success++; } catch (e) { results.failed++; results.errors.push({ row, error: e.message }); }
    }
    return results;
  },
  async importNilai() {
    const results = { success: 0, failed: 0, errors: [] };
    for (const row of this.parsedData) {
      const nis = (row['NIS'] || row['nis'] || '').toString().trim(); const mapel = row['Mata Pelajaran'] || row['mapel'] || row['Mapel'] || '';
      if (!nis || !mapel) { results.failed++; results.errors.push({ row, error: 'NIS/Mapel kosong' }); continue; }
      const akademikRecords = await DB.getAkademikBySiswa(nis);
      if (akademikRecords.length === 0) { results.failed++; results.errors.push({ row, error: 'Akademik tidak ditemukan: ' + nis }); continue; }
      const latestAkad = akademikRecords[akademikRecords.length - 1];
      try { await DB.addNilai({ akademikId: latestAkad.id, mapel, nilaiSem1: parseInt(row['Nilai Sem 1'] || row['nilaiSem1'] || '0') || null, nilaiSem2: parseInt(row['Nilai Sem 2'] || row['nilaiSem2'] || '0') || null, deskSem1: row['Deskripsi Sem 1'] || row['deskSem1'] || '', deskSem2: row['Deskripsi Sem 2'] || row['deskSem2'] || '' }); results.success++; } catch (e) { results.failed++; results.errors.push({ row, error: e.message }); }
    }
    return results;
  },
  async importNonAkademik() {
    const results = { success: 0, failed: 0, errors: [] };
    for (const row of this.parsedData) {
      const nis = (row['NIS'] || row['nis'] || '').toString().trim();
      if (!nis) { results.failed++; results.errors.push({ row, error: 'NIS kosong' }); continue; }
      const akademikRecords = await DB.getAkademikBySiswa(nis);
      if (akademikRecords.length === 0) { results.failed++; results.errors.push({ row, error: 'Akademik tidak ditemukan: ' + nis }); continue; }
      const latestAkad = akademikRecords[akademikRecords.length - 1];
      try { await DB.addNonAkademik({ akademikId: latestAkad.id, ekskulKegiatan1: row['Ekskul Sem 1'] || '', ekskulKet1: row['Ket Sem 1'] || '', ekskulKegiatan2: row['Ekskul Sem 2'] || '', ekskulKet2: row['Ket Sem 2'] || '', sakit1: parseInt(row['Sakit Sem 1'] || '0') || 0, izin1: parseInt(row['Izin Sem 1'] || '0') || 0, alpha1: parseInt(row['Alpha Sem 1'] || '0') || 0, sakit2: parseInt(row['Sakit Sem 2'] || '0') || 0, izin2: parseInt(row['Izin Sem 2'] || '0') || 0, alpha2: parseInt(row['Alpha Sem 2'] || '0') || 0 }); results.success++; } catch (e) { results.failed++; results.errors.push({ row, error: e.message }); }
    }
    return results;
  }
};
  </script>


  <!-- app.js -->
  <script>
(async function() {
  try { await DB.init(); console.log('Database initialized'); }
  catch (e) { console.error('DB init failed:', e); document.body.innerHTML = '<div style="padding:40px;text-align:center;"><h2>Error</h2><p>Gagal menginisialisasi database.</p></div>'; return; }

  // Load custom mapel from localStorage
  const storedMapel = localStorage.getItem('mapelList');
  if (storedMapel) {
    const parsed = JSON.parse(storedMapel);
    MATA_PELAJARAN.length = 0;
    parsed.forEach(m => MATA_PELAJARAN.push(m));
  }

  Sidebar.render();

  window.addEventListener('page-change', async (event) => {
    const { page, params } = event.detail;
    switch (page) {
      case 'dashboard': await Dashboard.init(); break;
      case 'input-data': await InputData.init(); break;
      case 'student-detail': if (params && params.nis) await StudentDetail.init(params.nis); break;
      case 'data-akademik': DataAkademik.init(); break;
      case 'input-nilai': await InputNilai.init(); break;
      case 'ekstrakurikuler': await Ekstrakurikuler.init(); break;
      case 'import-data-file': ImportData.init(); break;
    }
  });

  Router.navigateTo('dashboard');
})();
  </script>
