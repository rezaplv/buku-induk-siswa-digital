<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Buku Induk Siswa Digital</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar"></aside>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Dashboard Page -->
      <div id="page-dashboard" class="page" style="display:none;"></div>

      <!-- Input Data Page -->
      <div id="page-input-data" class="page" style="display:none;"></div>

      <!-- Student Detail Page -->
      <div id="page-student-detail" class="page" style="display:none;"></div>

      <!-- Data Akademik Page -->
      <div id="page-data-akademik" class="page" style="display:none;"></div>

      <!-- Input Nilai Page -->
      <div id="page-input-nilai" class="page" style="display:none;"></div>

      <!-- Ekstrakurikuler Page -->
      <div id="page-ekstrakurikuler" class="page" style="display:none;"></div>

      <!-- Ketidakhadiran Page -->
      <div id="page-ketidakhadiran" class="page" style="display:none;"></div>

      <!-- Import Data Page -->
      <div id="page-import-data-file" class="page" style="display:none;"></div>
    </main>
  </div>

  <!-- Print Area (hidden, used for PDF generation) -->
  <div id="print-area"></div>

  <!-- Scripts -->
  <script src="/js/db.js"></script>
  <script src="/js/router.js"></script>
  <script src="/js/utils/csv-parser.js"></script>
  <script src="/js/utils/xlsx-parser.js"></script>
  <script src="/js/utils/pdf-generator.js"></script>
  <script src="/js/components/sidebar.js"></script>
  <script src="/js/components/dashboard.js"></script>
  <script src="/js/components/student-detail.js"></script>
  <script src="/js/components/import-data.js"></script>
  <script src="/js/components/ekstrakurikuler.js"></script>
  <script src="/js/components/ketidakhadiran.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
